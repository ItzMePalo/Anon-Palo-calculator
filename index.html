<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shard Flip Calculator</title>
<style>
  :root {
    --bg:#0a0c10;--surface:#111318;--surface2:#181c24;
    --border:#252a36;--border2:#2e3545;--text:#f0f2fa;
    --muted:#8b95aa;--accent:#7ee8b8;--accent2:#4fd1c5;
    --gold:#f6c90e;--red:#ff5e5e;--blue:#60a5fa;--purple:#c084fc;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{color-scheme:dark;}
  ::-webkit-color-swatch-wrapper{padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:17px;font-weight:400;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(126,232,184,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(126,232,184,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  .wrapper{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:0 36px 120px;}

  /* ── HEADER ── */
  header{padding:52px 0 40px;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:20px;border-bottom:1px solid var(--border);margin-bottom:44px;}
  .logo{font-size:34px;font-weight:700;letter-spacing:-0.5px;}
  .logo span{color:var(--accent);}
  .logo-sub{font-size:13px;color:var(--muted);margin-top:6px;letter-spacing:0.05em;}
  .header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .sync-status{font-size:12px;padding:6px 12px;border-radius:8px;border:1px solid var(--border2);color:var(--muted);background:var(--surface);}
  .sync-status.ok{color:var(--accent);border-color:rgba(126,232,184,0.3);}
  .sync-status.err{color:var(--red);border-color:rgba(255,94,94,0.3);}
  .sync-status.loading{color:var(--gold);border-color:rgba(246,201,14,0.3);}

  /* ── TABS ── */
  .tabs{display:flex;gap:5px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:5px;flex-wrap:wrap;}
  .tab{padding:10px 20px;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;color:var(--muted);transition:all 0.15s;border:none;background:none;font-family:inherit;white-space:nowrap;-webkit-appearance:none;appearance:none;text-decoration:none;-webkit-text-fill-color:var(--muted);}
  .tab:hover{color:var(--text);-webkit-text-fill-color:var(--text);}
  .tab.active{background:var(--surface2);color:var(--accent);border:1px solid var(--border2);-webkit-text-fill-color:var(--accent);}
  .tab-manage{margin-left:4px;color:var(--accent);border:1px solid rgba(126,232,184,0.3);background:rgba(126,232,184,0.06);-webkit-text-fill-color:var(--accent);}
  .tab-manage:hover{background:rgba(126,232,184,0.12);}
  .tab-manage.active{background:rgba(126,232,184,0.16);border-color:var(--accent);}
  .tab-log{color:var(--gold);border:1px solid rgba(246,201,14,0.3);background:rgba(246,201,14,0.06);-webkit-text-fill-color:var(--gold);}
  .tab-log:hover{background:rgba(246,201,14,0.12);}
  .tab-log.active{background:rgba(246,201,14,0.16);border-color:var(--gold);color:var(--gold);}
  .tab-worth{color:var(--purple);border:1px solid rgba(192,132,252,0.3);background:rgba(192,132,252,0.06);-webkit-text-fill-color:var(--purple);}
  .tab-worth:hover{background:rgba(192,132,252,0.12);}
  .tab-worth.active{background:rgba(192,132,252,0.16);border-color:var(--purple);color:var(--purple);-webkit-text-fill-color:var(--purple);}

  .panel{display:none;}
  .panel.active{display:block;animation:fadeIn 0.2s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  /* ── PRODUCT PANEL ── */
  .product-header{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:32px;}
  .product-title{font-size:32px;font-weight:700;}
  .chain-badge{font-size:13px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 18px;line-height:1.9;max-width:640px;}

  .section-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:0.14em;text-transform:uppercase;margin:30px 0 14px;padding-bottom:10px;border-bottom:1px solid var(--border);}

  @keyframes cardPulse{0%{box-shadow:0 0 0 0 rgba(126,232,184,0);}30%{box-shadow:0 0 0 4px rgba(126,232,184,0.3);}100%{box-shadow:0 0 0 0 rgba(126,232,184,0);}}
  .card.pulse{animation:cardPulse 0.6s ease-out;}

  .grid-4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;margin-bottom:20px;}
  @media(max-width:860px){.grid-4{grid-template-columns:1fr 1fr;}}
  @media(max-width:500px){.grid-4{grid-template-columns:1fr;}}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;}
  .card-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:10px;}
  .card-val{font-size:34px;font-weight:700;line-height:1;}
  .card-val.accent{color:var(--accent);}
  .card-val.gold{color:var(--gold);}
  .card-val.red{color:var(--red);}
  .card-sub{font-size:13px;color:var(--muted);margin-top:7px;}

  .cps-box{background:var(--surface2);border:1px solid var(--border2);border-radius:14px;padding:30px 34px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:20px;margin-bottom:20px;}
  .cps-half{flex:1;min-width:180px;}
  .cps-half:last-child{text-align:right;}
  .cps-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:8px;}
  .cps-val{font-size:52px;font-weight:700;line-height:1;letter-spacing:-1px;}
  .cps-val.pos{color:var(--accent);}
  .cps-val.neg{color:var(--red);}
  .cps-sub{font-size:13px;color:var(--muted);margin-top:7px;}
  .cps-divider{width:1px;background:var(--border2);align-self:stretch;min-height:60px;}

  .input-group{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px 26px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:10px;}
  .input-group-label{font-size:17px;font-weight:500;flex:1;min-width:160px;}
  .input-group-sub{font-size:13px;color:var(--muted);margin-top:4px;}
  .budget-row{background:rgba(246,201,14,0.05);border:1px solid rgba(246,201,14,0.2);border-radius:14px;padding:18px 26px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:10px;}
  .budget-badge{font-size:13px;color:var(--gold);margin-top:4px;}

  /* ── STOCK MODE (from-stock calculator) ── */
  .stock-section{background:var(--surface);border:1px solid rgba(96,165,250,0.2);border-radius:14px;padding:22px 26px;margin-bottom:16px;}
  .stock-title{font-size:14px;font-weight:700;color:var(--blue);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px;}
  .stock-sub{font-size:13px;color:var(--muted);margin-bottom:16px;}
  .stock-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:16px;}
  .stock-field{display:flex;flex-direction:column;gap:6px;}
  .stock-field label{font-size:11px;font-weight:700;color:var(--blue);letter-spacing:0.1em;text-transform:uppercase;}
  .stock-field input{background:var(--surface2)!important;border:1px solid rgba(96,165,250,0.3);border-radius:10px;color:var(--text)!important;font-size:16px;font-weight:600;font-family:inherit;padding:10px 14px;outline:none;-webkit-appearance:none;-webkit-text-fill-color:var(--text)!important;-webkit-box-shadow:0 0 0 1000px var(--surface2) inset!important;}
  .stock-field input:focus{border-color:#60a5fa;}
  .stock-result{background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:16px 20px;font-size:14px;color:var(--muted);min-height:44px;}
  .stock-result .sr-hi{font-weight:700;color:var(--accent);}
  .stock-result .sr-need{color:var(--blue);}
  .stock-result .sr-cost{color:var(--gold);}
  /* keep toggle-switch for alt-ingredient toggle */
  .toggle-switch{position:relative;width:44px;height:24px;flex-shrink:0;}
  .toggle-switch input{opacity:0;width:0;height:0;}
  .toggle-slider{position:absolute;cursor:pointer;inset:0;background:var(--surface2);border:1px solid var(--border2);border-radius:24px;transition:0.2s;}
  .toggle-slider:before{content:'';position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:var(--muted);border-radius:50%;transition:0.2s;}
  input:checked+.toggle-slider{background:rgba(96,165,250,0.2);border-color:rgba(96,165,250,0.5);}
  input:checked+.toggle-slider:before{transform:translateX(20px);background:#60a5fa;}

  .smart-input{background:var(--surface2)!important;border:1px solid var(--border2);border-radius:10px;color:var(--text)!important;font-size:19px;font-weight:600;font-family:inherit;padding:11px 16px;width:150px;text-align:right;transition:border-color 0.15s;outline:none;-webkit-appearance:none;appearance:none;-webkit-text-fill-color:var(--text)!important;-webkit-box-shadow:0 0 0 1000px var(--surface2) inset!important;}
  .smart-input:focus{border-color:var(--accent);}
  .smart-input.error{border-color:var(--red);}
  input,select,textarea{
    background:var(--surface2)!important;
    color:var(--text)!important;
    -webkit-text-fill-color:var(--text)!important;
    -webkit-appearance:none;
    appearance:none;
    /* iOS Safari autofill override */
    -webkit-box-shadow:0 0 0 1000px var(--surface2) inset!important;
    box-shadow:0 0 0 1000px var(--surface2) inset!important;
  }
  input::placeholder{color:var(--muted);-webkit-text-fill-color:var(--muted)!important;opacity:1;}
  input:-webkit-autofill,input:-webkit-autofill:hover,input:-webkit-autofill:focus,input:-webkit-autofill:active{
    -webkit-box-shadow:0 0 0 1000px var(--surface2) inset!important;
    -webkit-text-fill-color:var(--text)!important;
    caret-color:var(--text);
  }
  select{color-scheme:dark;}
  .tab,.btn{-webkit-appearance:none;appearance:none;cursor:pointer;}
  .tabs{-webkit-tap-highlight-color:transparent;}
  a,.tab{color:inherit;text-decoration:none;}

  .bazaar-btn{display:flex;align-items:center;gap:8px;background:rgba(96,165,250,0.08);border:1px solid rgba(96,165,250,0.25);color:#93c5fd;border-radius:10px;padding:10px 18px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;transition:all 0.15s;}
  .bazaar-btn:hover{background:rgba(96,165,250,0.15);}
  .bazaar-btn.loading{opacity:0.6;pointer-events:none;}
  .bazaar-status{font-size:12px;color:var(--muted);}
  .bazaar-status.ok{color:var(--accent);}
  .bazaar-status.err{color:var(--red);}

  .ingredients{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px;}
  .ing-header{display:flex;align-items:center;justify-content:space-between;padding:12px 26px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:11px;font-weight:700;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;}
  .ing-row{display:flex;align-items:center;justify-content:space-between;padding:18px 26px;border-bottom:1px solid var(--border);gap:14px;flex-wrap:wrap;}
  .ing-row:last-child{border-bottom:none;}
  .ing-name{font-size:17px;font-weight:500;min-width:150px;}
  .ing-right{display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
  .ing-qty{font-size:19px;font-weight:600;color:var(--accent);min-width:80px;text-align:right;}
  .ing-cost{font-size:14px;color:var(--muted);min-width:100px;text-align:right;}

  .profit-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-top:20px;}
  .profit-row{display:flex;align-items:center;justify-content:space-between;padding:18px 26px;border-bottom:1px solid var(--border);}
  .profit-row:last-child{border-bottom:none;background:var(--surface2);}
  .profit-row .label{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;}
  .profit-row .val{font-size:20px;font-weight:700;}
  .profit-row .val.pos{color:var(--accent);}
  .profit-row .val.neg{color:var(--red);}

  /* ── FLIP LOG ── */
  .log-stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;margin-bottom:28px;}
  /* ── LOG FLIP INLINE ── */
  .log-flip-box{background:rgba(246,201,14,0.05);border:1px solid rgba(246,201,14,0.2);border-radius:14px;padding:20px 26px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-top:8px;}
  .log-flip-left{flex:1;min-width:180px;}
  .log-flip-title{font-size:16px;font-weight:600;color:var(--gold);}
  .log-flip-sub{font-size:13px;color:var(--muted);margin-top:4px;}
  .log-flip-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .log-flip-status{font-size:13px;min-width:80px;}
  .log-flip-status.ok{color:var(--accent);}
  .log-flip-status.err{color:var(--red);}
  /* ── WORTH SAVE PRICE ── */
  .worth-save-btn{background:rgba(126,232,184,0.08);border:1px solid rgba(126,232,184,0.25);color:var(--accent);border-radius:7px;padding:5px 11px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.12s;}
  .worth-save-btn:hover{background:rgba(126,232,184,0.18);}
  .worth-save-btn.saving{opacity:0.5;pointer-events:none;}
  .worth-save-btn.saved{color:var(--muted);border-color:var(--border2);}

  @media(max-width:600px){.log-stats{grid-template-columns:1fr;}}
  .log-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;}
  .log-card .lc-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:10px;}
  .log-card .lc-val{font-size:36px;font-weight:700;}
  .log-card .lc-val.pos{color:var(--accent);}
  .log-card .lc-val.neg{color:var(--red);}
  .log-card .lc-val.gold{color:var(--gold);}

  .log-form{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;margin-bottom:24px;}
  .log-form h3{font-size:20px;font-weight:600;margin-bottom:20px;}
  .log-form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:16px;}
  .log-field{display:flex;flex-direction:column;gap:6px;}
  .log-field label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}
  .log-field input,.log-field select{background:var(--surface2)!important;border:1px solid var(--border2);border-radius:10px;color:var(--text)!important;font-size:16px;font-family:inherit;padding:11px 14px;outline:none;-webkit-text-fill-color:var(--text)!important;-webkit-box-shadow:0 0 0 1000px var(--surface2) inset!important;}
  .log-field input:focus,.log-field select:focus{border-color:var(--accent);}
  .log-preview{font-size:14px;color:var(--muted);margin-bottom:16px;padding:12px 16px;background:var(--surface2);border-radius:10px;min-height:42px;}
  .log-preview span{color:var(--accent);font-weight:600;}

  .flip-table{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
  .flip-table-header{display:grid;grid-template-columns:1fr 80px 100px 100px 110px 44px;gap:0;padding:12px 20px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:11px;font-weight:700;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}
  .flip-row{display:grid;grid-template-columns:1fr 80px 100px 100px 110px 44px;gap:0;padding:16px 20px;border-bottom:1px solid var(--border);align-items:center;font-size:15px;}
  .flip-row:last-child{border-bottom:none;}
  .flip-row:hover{background:var(--surface2);}
  .flip-row .fr-name{font-weight:500;}
  .flip-row .fr-profit{font-weight:600;}
  .flip-row .fr-profit.pos{color:var(--accent);}
  .flip-row .fr-profit.neg{color:var(--red);}
  .flip-empty{padding:40px;text-align:center;color:var(--muted);font-size:15px;}
  .del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px 8px;border-radius:6px;font-family:inherit;}
  .del-btn:hover{color:var(--red);background:rgba(255,94,94,0.1);}
  @media(max-width:700px){
    .flip-table-header,.flip-row{grid-template-columns:1fr 80px 100px 44px;}
    .flip-table-header>*:nth-child(3),.flip-table-header>*:nth-child(4),
    .flip-row>*:nth-child(3),.flip-row>*:nth-child(4){display:none;}
  }

  /* ── MANAGE PANEL ── */
  .manage-panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;margin-bottom:20px;}
  .manage-panel h3{font-size:20px;font-weight:600;margin-bottom:20px;}
  .form-row{display:flex;align-items:flex-end;gap:12px;margin-bottom:12px;flex-wrap:wrap;}
  .form-field{display:flex;flex-direction:column;gap:6px;}
  .form-field label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}
  .form-field input{background:var(--surface2)!important;border:1px solid var(--border2);border-radius:10px;color:var(--text)!important;font-size:15px;font-family:inherit;padding:10px 14px;outline:none;min-width:150px;-webkit-text-fill-color:var(--text)!important;-webkit-box-shadow:0 0 0 1000px var(--surface2) inset!important;}
  .form-field input:focus{border-color:var(--accent);}
  .product-list-item{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;background:var(--surface2);}
  .p-name{font-size:16px;font-weight:500;}
  .p-chain{font-size:13px;color:var(--muted);margin-top:3px;}
  .alert{background:rgba(255,94,94,0.08);border:1px solid rgba(255,94,94,0.3);border-radius:10px;padding:12px 16px;font-size:14px;color:var(--red);margin-top:12px;display:none;}

  /* ── ITEM WORTH ── */
  .worth-layout{display:grid;grid-template-columns:1fr 380px;gap:24px;align-items:start;}
  @media(max-width:900px){.worth-layout{grid-template-columns:1fr;}}

  .worth-left{}
  .worth-right{position:sticky;top:24px;}

  .worth-section{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;}
  .worth-section-header{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;background:var(--surface2);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;}
  .worth-section-header:hover{background:var(--border);}
  .worth-section-title{font-size:14px;font-weight:700;color:var(--text);letter-spacing:0.05em;}
  .worth-section-badge{font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;background:rgba(192,132,252,0.12);color:var(--purple);border:1px solid rgba(192,132,252,0.25);}
  .worth-section-badge.has-cost{background:rgba(126,232,184,0.1);color:var(--accent);border-color:rgba(126,232,184,0.3);}
  .worth-section-chevron{color:var(--muted);font-size:12px;transition:transform 0.2s;}
  .worth-section-chevron.open{transform:rotate(180deg);}
  .worth-section-body{padding:20px 22px;display:none;}
  .worth-section-body.open{display:block;animation:fadeIn 0.15s ease;}

  /* stepper + qty row */
  .worth-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);gap:12px;}
  .worth-row:last-child{border-bottom:none;}
  .worth-row-left{flex:1;}
  .worth-row-name{font-size:15px;font-weight:500;}
  .worth-row-sub{font-size:12px;color:var(--muted);margin-top:3px;}
  .worth-row-right{display:flex;align-items:center;gap:10px;}
  .stepper{display:flex;align-items:center;gap:0;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;overflow:hidden;}
  .step-btn{background:none;border:none;color:var(--muted);font-size:18px;padding:6px 12px;cursor:pointer;font-family:inherit;transition:all 0.12s;line-height:1;}
  .step-btn:hover{color:var(--text);background:var(--border);}
  .step-val{font-size:16px;font-weight:700;min-width:32px;text-align:center;color:var(--text);padding:6px 4px;}
  .worth-price-inp{background:var(--surface2);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-size:14px;font-weight:600;font-family:inherit;padding:8px 10px;width:100px;text-align:right;outline:none;-webkit-appearance:none;-webkit-text-fill-color:var(--text);}
  .worth-price-inp:focus{border-color:var(--purple);}

function parseNum(raw){
  if(raw==null) return NaN;
  const s=String(raw).replace(/,/g,'').trim().toLowerCase();
  if(!s) return NaN;
  const m=s.match(/^([0-9]*\.?[0-9]+)\s*([km]?)$/);
  if(!m) return NaN;
  let n=parseFloat(m[1]);
  if(m[2]==='k') n*=1e3;
  if(m[2]==='m') n*=1e6;
  return n;
}
function displayNum(n){
  if(!n&&n!==0) return '';
  n=Math.round(n);
  if(n>=1e6&&n%1e6===0) return (n/1e6)+'m';
  if(n>=1e6) return parseFloat((n/1e6).toFixed(3))+'m';
  if(n>=1e3&&n%1e3===0) return (n/1e3)+'k';
  if(n>=1e3) return parseFloat((n/1e3).toFixed(2))+'k';
  return String(n);
}
// fmtPrice: show raw number for price inputs - preserves decimals, no k/m conversion
function fmtPrice(n){
  if(!n&&n!==0) return '';
  // Round to at most 1 decimal place to avoid floating point noise
  const r = Math.round(n*10)/10;
  return String(r);
}
function fmt(n){
  if(isNaN(n)||n==null) return '—';
  n=Math.round(n);
  const a=Math.abs(n);
  if(a>=1e9) return (n/1e9).toFixed(2)+'B';
  if(a>=1e6) return (n/1e6).toFixed(2)+'M';
  if(a>=1e3) return (n/1e3).toFixed(1)+'k';
  return n.toLocaleString();
}
function slugify(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');}

function setStatus(msg,cls=''){
  const s=el('sync-status');
  if(!s) return;
  s.textContent=msg;
  s.className='sync-status'+(cls?' '+cls:'');
}

async function ghRead(){
  setStatus('⟳ Syncing...','loading');
  try{
    const headers={'Accept':'application/vnd.github.v3+json'};
    if(ghToken&&ghToken!=='PASTE_YOUR_TOKEN_HERE') headers['Authorization']='token '+ghToken;
    const res=await fetch(GH_API+`?ref=${GH_BRANCH}&t=${Date.now()}`,{headers});
    if(res.status===404){setStatus('⚠ No data.json yet','');return null;}
    if(res.status===401||res.status===403){setStatus('⚠ Token missing or invalid — see instructions','err');return null;}
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json=await res.json();
    ghSha=json.sha;
    const decoded=JSON.parse(atob(json.content.replace(/\n/g,'')));
    setStatus('✓ Synced','ok');
    return decoded;
  }catch(e){setStatus('✗ Sync failed','err');console.error('ghRead:',e);return null;}
}

async function ghWrite(data){
  if(!ghToken||ghToken==='PASTE_YOUR_TOKEN_HERE'){
    setStatus('⚠ No token — open index.html, find GH_TOKEN and paste your token','err');
    return false;
  }
  setStatus('⟳ Saving...','loading');
  try{
    // If we don't have a SHA yet (first run or page reload), fetch it now
    if(!ghSha){
      try{
        const r=await fetch(GH_API+`?ref=${GH_BRANCH}&t=${Date.now()}`);
        if(r.ok){const j=await r.json();ghSha=j.sha||'';}
      }catch(e){/* file might not exist yet, sha stays empty */}
    }
    const body={
      message:'Update data.json via Shard Flip Calculator',
      content:btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2)))),
      branch:GH_BRANCH,
    };
    if(ghSha) body.sha=ghSha;
    const res=await fetch(GH_API,{
      method:'PUT',
      headers:{'Authorization':'token '+ghToken,'Content-Type':'application/json'},
      body:JSON.stringify(body),
    });
    if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.message||'HTTP '+res.status);}
    const json=await res.json();
    ghSha=json.content.sha;
    setStatus('✓ Saved','ok');
    return true;
  }catch(e){setStatus('✗ Save failed: '+e.message,'err');console.error('ghWrite:',e);return false;}
}

// ─── ACCESSORS ───────────────────────────────────────────────────────────────
function getProduct(pid){return remoteData.products.find(x=>x.id===pid);}
function getPrice(pid,iid){const k=`${pid}__${iid}`;return local.prices[k]!==undefined?local.prices[k]:(getProduct(pid)?.defaultPrices?.[iid]||0);}
function getSell(pid){const k=`${pid}__sell`;return local.prices[k]!==undefined?local.prices[k]:(getProduct(pid)?.defaultPrices?.sell||0);}
function getQtyStr(pid){return local.qtys[pid]||'64';}
function getQty(pid){return parseNum(getQtyStr(pid))||64;}
function getBudgetStr(pid){return local.budgets[pid]||'';}
function isInvMode(pid){return !!local.invMode[pid];}
function getInvQty(pid,iid){return local.invQtys[`${pid}__${iid}`]||'';}
function setPrice(pid,iid,v){local.prices[`${pid}__${iid}`]=Math.round(v);saveLocal();}
function setSell(pid,v){local.prices[`${pid}__sell`]=Math.round(v);saveLocal();}
function setQtyStr(pid,v){local.qtys[pid]=v;saveLocal();}
function setBudgetStr(pid,v){local.budgets[pid]=v;saveLocal();}
function setInvMode(pid,v){local.invMode[pid]=v;saveLocal();}
function setInvQty(pid,iid,v){local.invQtys[`${pid}__${iid}`]=v;saveLocal();}
function getAltChoice(pid,iid){return local.altChoice[`${pid}__${iid}`]||'base';}
function setAltChoice(pid,iid,v){local.altChoice[`${pid}__${iid}`]=v;saveLocal();}
// Get the effective ingredient id (base or alt)
function getEffIngId(pid,ing){
  if(!ing.altId) return ing.id;
  return getAltChoice(pid,ing.id)==='alt' ? ing.altId : ing.id;
}
function getEffIngName(pid,ing){
  if(!ing.altId) return ing.name;
  return getAltChoice(pid,ing.id)==='alt' ? ing.altName : ing.name;
}

// ─── CALC ─────────────────────────────────────────────────────────────────────
function calc(product){
  const qty=getQty(product.id);
  let totalCost=0;
  const ings=product.ingredients.map(ing=>{
    const effId=getEffIngId(product.id,ing);
    const effName=getEffIngName(product.id,ing);
    const price=getPrice(product.id,effId);
    const needed=Math.ceil(ing.perUnit*qty);
    const cost=Math.round(needed*price);
    totalCost+=cost;
    return {...ing,id:effId,name:effName,origId:ing.id,altId:ing.altId,altName:ing.altName,price,needed,cost};
  });
  totalCost=Math.round(totalCost);
  const sellPrice=getSell(product.id);
  const revenue=Math.round(qty*sellPrice);
  const profit=Math.round(revenue-totalCost);
  const costPerShard=qty>0?Math.round(totalCost/qty):0;
  const profitPerShard=qty>0?Math.round(profit/qty):0;
  const margin=totalCost>0?profit/totalCost*100:0;
  return{qty,ings,totalCost,sellPrice,revenue,profit,costPerShard,profitPerShard,margin};
}

// ─── STOCK CALC ───────────────────────────────────────────────────────────────
// Given amounts of each ingredient, figure out max outputs, what to buy, profit
function calcStock(product){
  const pid=product.id;
  let maxOutputs=Infinity;
  const ingData=[];
  for(const origIng of product.ingredients){
    const effId=getEffIngId(pid,origIng);
    const effName=getEffIngName(pid,origIng);
    const haveStr=getInvQty(pid,origIng.id);
    const have=parseNum(haveStr)||0;
    const perOutput=origIng.perUnit;
    const possible=perOutput>0?Math.floor(have/perOutput):Infinity;
    if(perOutput>0&&have>0) maxOutputs=Math.min(maxOutputs,possible);
    ingData.push({origId:origIng.id,effId,effName,have,perOutput,possible});
  }
  // If no stock entered at all, return null
  const anyEntered=ingData.some(i=>i.have>0);
  if(!anyEntered) return null;
  if(maxOutputs===Infinity) maxOutputs=0;

  // For each ingredient: how many do you have, how many do you need, how many to buy
  const breakdown=[];
  let totalBuyCost=0;
  for(const ing of ingData){
    const needed=Math.ceil(ing.perOutput*maxOutputs);
    const toUse=Math.min(ing.have,needed);
    const toBuy=Math.max(0,needed-ing.have);
    const buyPrice=getPrice(pid,ing.effId);
    const buyCost=Math.round(toBuy*buyPrice);
    totalBuyCost+=buyCost;
    breakdown.push({...ing,needed,toUse,toBuy,buyCost});
  }

  const sellPrice=getSell(pid);
  const revenue=Math.round(maxOutputs*sellPrice);
  // Total cost = cost of what you're buying to fill gaps
  const profit=Math.round(revenue-totalBuyCost);

  return{maxOutputs,breakdown,revenue,totalBuyCost,profit,sellPrice,anyEntered};
}

// ─── FLIP LOG CALC ────────────────────────────────────────────────────────────
function calcLifetime(){
  let totalRevenue=0,totalSpend=0;
  remoteData.flips.forEach(f=>{
    totalRevenue+=Math.round(f.qty*f.sellPrice);
    totalSpend  +=Math.round(f.qty*f.costPerShard);
  });
  return{totalRevenue:Math.round(totalRevenue),totalSpend:Math.round(totalSpend),totalProfit:Math.round(totalRevenue-totalSpend),count:remoteData.flips.length};
}

function reapplyBudget(pid){
  const budStr=getBudgetStr(pid);
  const budget=parseNum(budStr);
  if(isNaN(budget)||budget<=0) return;
  const product=getProduct(pid); if(!product) return;
  const r=calc(product);
  if(r.costPerShard>0){
    const mq=Math.floor(budget/r.costPerShard);
    setQtyStr(pid,String(mq));
    const qi=el(`inp-qty-${pid}`); if(qi) qi.value=displayNum(mq);
    setText(`budget-badge-${pid}`,`Max ${mq.toLocaleString()} shards`);
    updateDisplay(pid);
  }
}

  const noteLbl=document.createElement('label'); noteLbl.textContent='Note (optional)';

  ['log-qty','log-sell','log-cost'].forEach(id=>{ el(id)?.addEventListener('input',updateLogPreview); });
  pSel.addEventListener('change',updateLogPreview);
  pSel.addEventListener('change',()=>{
    const pid=pSel.value; const product=getProduct(pid);
    if(product){const r=calc(product);const ci=el('log-cost');if(ci&&!ci.value)ci.value=displayNum(r.costPerShard);}
  });

    const pid=pSel.value; const product=getProduct(pid);
    if(product){const r=calc(product);const ci=el('log-cost');if(ci&&!ci.value)ci.value=displayNum(r.costPerShard);}

function updateLogPreview(){
  const qty=parseNum(el('log-qty')?.value||'');
  const sell=parseNum(el('log-sell')?.value||'');
  const cost=parseNum(el('log-cost')?.value||'');
  const prev=el('log-preview'); if(!prev) return;
  if(isNaN(qty)||isNaN(sell)||isNaN(cost)){prev.textContent='Fill in the fields above to preview profit';return;}
  const revenue=Math.round(qty*sell),spend=Math.round(qty*cost),profit=Math.round(revenue-spend);
  prev.innerHTML=`${qty.toLocaleString()} shards → Revenue <span>${fmt(revenue)}</span> − Spend <span>${fmt(spend)}</span> = <span style="color:${profit>=0?'var(--accent)':'var(--red)'}">${profit>=0?'+':'-'}${fmt(Math.abs(profit))}</span>`;
}

function buildFlipTable(){
  if(!remoteData.flips.length){
    const emp=document.createElement('div'); emp.className='flip-empty'; emp.textContent='No flips logged yet. Log your first flip above!'; return emp;
  }
  const wrap=document.createElement('div'); wrap.className='flip-table';
  wrap.innerHTML='<div class="flip-table-header"><span>Product</span><span>Qty</span><span>Revenue</span><span>Spent</span><span>Profit</span><span></span></div>';
  [...remoteData.flips].reverse().forEach((f,ri)=>{
    const i=remoteData.flips.length-1-ri;
    const revenue=Math.round(f.qty*f.sellPrice),spend=Math.round(f.qty*f.costPerShard),profit=Math.round(revenue-spend);
    const row=document.createElement('div'); row.className='flip-row';
    const nameEl=document.createElement('span'); nameEl.className='fr-name'; nameEl.textContent=f.productName+(f.note?' — '+f.note:'');
    const qtyEl=document.createElement('span'); qtyEl.textContent=f.qty.toLocaleString();
    const revEl=document.createElement('span'); revEl.textContent=fmt(revenue);
    const spEl=document.createElement('span'); spEl.textContent=fmt(spend);
    const prEl=document.createElement('span'); prEl.className='fr-profit '+(profit>=0?'pos':'neg'); prEl.textContent=(profit>=0?'+':'')+fmt(profit);
    const delBtn=document.createElement('button'); delBtn.className='del-btn'; delBtn.textContent='✕'; delBtn.dataset.action='delete-flip'; delBtn.dataset.flipIndex=i;
    row.appendChild(nameEl);row.appendChild(qtyEl);row.appendChild(revEl);row.appendChild(spEl);row.appendChild(prEl);row.appendChild(delBtn);
    wrap.appendChild(row);
  });
  return wrap;
}

function refreshLogStats(){
  const lt=calcLifetime();
  setText('lt-rev',fmt(lt.totalRevenue)); setText('lt-spend',fmt(lt.totalSpend));
  const pe=el('lt-profit'); if(pe){pe.textContent=(lt.totalProfit>=0?'+':'')+fmt(lt.totalProfit);pe.className='lc-val '+(lt.totalProfit>=0?'pos':'neg');}
  const tw=el('flip-table-wrap'); if(tw){tw.innerHTML='';tw.appendChild(buildFlipTable());}
}

// Restore saved prices into worthState after local is initialized
function restoreWorthPrices(){
  worthState.margin = local.worthMargin||20;
  // Merge: remote (data.json) takes priority, localStorage as fallback
  const merged={...local.worthPrices,...remoteData.worthPrices};
  for(const [secId,sec] of Object.entries(UPGRADES)){
    for(const item of sec.items){
      const saved=merged[item.id];
      if(saved>0){
        if(!worthState.upgrades[item.id]) worthState.upgrades[item.id]={qty:0,price:saved,isLive:false};
        else worthState.upgrades[item.id].price=saved;
      }
    }
  }
}

// ─── LORE PARSER ─────────────────────────────────────────────────────────────
function stripCodes(s){ return s.replace(/§[0-9a-fklmnor]/gi,'').trim(); }

function parseLore(loreStr){
  const lines = loreStr.split('\n').map(stripCodes).filter(Boolean);
  const result = { hpb:0, fphb:0, recomb:false, stars:0, enchants:[], scrolls:[], reforge:'' };
  for(const line of lines){
    // HPB count from "N/15 Hot Potato Books Applied"
    const hpbFull = line.match(/(\d+)\s*\/\s*15/);
    if(hpbFull){ const n=parseInt(hpbFull[1]); result.hpb=Math.min(n,10); result.fphb=Math.max(0,n-10); }
    // Recombobulated tag
    if(/recombobulated/i.test(line)||line.includes('\u2726')) result.recomb=true;
    // Stars via ✪ symbols in item name row
    const starCount=(line.match(/\u272a/g)||[]).length;
    if(starCount>result.stars) result.stars=starCount;
    // Enchant lines: "Name Tier" at end of line
    const em=line.match(/^([A-Za-z][A-Za-z '\-]{1,30}?)\s+([IVXivx]{1,4}|\d{1,2})$/);
    if(em){
      const eName=em[1].trim(); const eTierRaw=em[2];
      let tier=parseInt(eTierRaw); if(isNaN(tier)) tier=romanToInt(eTierRaw);
      if(tier>0&&tier<=10&&eName.length>2&&!/[+\-\u272a%\u2763\u2748\u2694\u2726\u2741\u2665]/.test(eName)){
        result.enchants.push({name:eName,tier});
      }
    }
    // Scrolls
    if(/shadow assassin/i.test(line)) result.scrolls.push('Shadow Assassin Scroll');
    if(/juju shortbow/i.test(line)&&/scroll/i.test(line)) result.scrolls.push('Juju Shortbow Scroll');
    if(/necromancer.*scroll/i.test(line)) result.scrolls.push('Necromancer Scroll');
    if(/livid dagger.*scroll/i.test(line)) result.scrolls.push('Livid Dagger Scroll');
  }
  return result;
}

function romanToInt(s){
  const map={'I':1,'V':5,'X':10,'L':50,'C':100};
  s=String(s).toUpperCase(); let n=0;
  for(let i=0;i<s.length;i++){const c=map[s[i]]||0,nc=map[s[i+1]]||0;n+=c<nc?-c:c;}
  return n||NaN;
}

function matchEnchant(name,tier){
  const nl=name.toLowerCase().replace(/\s+/g,'');
  const allEnchItems=[...UPGRADES.ult_enchants.items,...UPGRADES.reg_enchants.items];
  for(const item of allEnchItems){
    const il=item.name.toLowerCase().replace(/\s+/g,'');
    if(il===nl||il.includes(nl)||nl.includes(il)) return {item,tier:Math.min(tier,item.maxTier),secId:UPGRADES.ult_enchants.items.includes(item)?'ult_enchants':'reg_enchants'};
  }
  return null;
}

function extractAuctionUUID(raw){
  raw=raw.trim();
  if(/^[0-9a-f]{8}-?[0-9a-f]{4}-?[0-9a-f]{4}-?[0-9a-f]{4}-?[0-9a-f]{12}$/i.test(raw)) return raw.replace(/-/g,'');
  const m=raw.match(/[?&](?:auction|id|uuid)=([0-9a-f\-]{32,36})/i)||raw.match(/\/([0-9a-f]{32})(?:[/?#]|$)/i);
  if(m) return m[1].replace(/-/g,'');
  const hex=raw.match(/[0-9a-f]{32}/i);
  if(hex) return hex[0];
  return null;
}

function inferItemTag(itemName){
  let n=stripCodes(itemName);
  n=n.replace(/[\u272a\u2725\u2724\u2723\u2722\u2721\u278e\u278d\u278c\u278b\u278a\u2726]/g,'').trim();
  const REFORGES=['fabled','heroic','giant','fierce','renowned','deadly','necrotic','warped','strong','superior','spiked','forceful','demonic','loving','lucky','clean','odd','fast','fair','epic','sharp','spicy','legendary','withered','bulky','festive','brilliant','mossy','shiny','jaded','magnetic','stiff','dirty','ancient','spiritual','wicked','frail','unreal','headstrong','precise','light','rich'];
  const parts=n.split(' ');
  if(parts.length>1&&REFORGES.includes(parts[0].toLowerCase())) n=parts.slice(1).join(' ');
  return n.toUpperCase().replace(/[^A-Z0-9]+/g,'_').replace(/^_|_$/g,'');
}

function worthCost(){
  let total=0;
  total+=worthState.baseItemCost||0;
  for(const [secId, sec] of Object.entries(UPGRADES)){
    if(secId==='ult_enchants'||secId==='reg_enchants') continue;
    if(secId==='normal_stars'){total+=calcNormalStarsCost();continue;}
    if(secId==='master_stars'){total+=calcMasterStarsCost();continue;}
    for(const item of sec.items){
      const s=worthState.upgrades[item.id];
      if(!s||!s.qty) continue;
      total+=s.qty*(s.price||item.defaultPrice);
    }
  }
  for(const e of worthState.addedEnchants){total+=(e.price||0);}
  return Math.round(total);
}

function worthBreakdown(){
  const rows=[];
  for(const [secId, sec] of Object.entries(UPGRADES)){
    if(secId==='ult_enchants'||secId==='reg_enchants') continue;
    if(secId==='normal_stars'){
      const ns=calcNormalStarsCost();
      const nsc=worthState.normalStarsCount||0;
      if(ns>0&&nsc>0) rows.push({label:`★${nsc} Normal Stars (essence)`,val:ns});
      continue;
    }
    if(secId==='master_stars'){
      const ms=calcMasterStarsCost();
      const msc=worthState.upgrades['master_stars_count']?.qty||0;
      if(ms>0&&msc>0) rows.push({label:`✪${msc} Master Stars`,val:ms});
      continue;
    }
    for(const item of sec.items){
      const s=worthState.upgrades[item.id];
      if(!s||!s.qty) continue;
      rows.push({label:`${item.name} ×${s.qty}`,val:s.qty*(s.price||item.defaultPrice)});
    }
  }
  for(const e of worthState.addedEnchants){
    rows.push({label:`${e.name} ${e.tier>0?'T'+e.tier:''}`,val:e.price||0});
  }
  return rows;
}

function calcNormalStarsCost(){
  const n=worthState.normalStarsCount||0;
  if(n<=0) return 0;
  const essenceType=worthState.normalStarEssenceType||'WITHER_ESSENCE';
  const essencePrice=worthState.essencePrices[essenceType]||0;
  const essPerStar=worthState.normalStarEssencePerStar||0;
  return Math.round(n*essPerStar*essencePrice);
}

function calcMasterStarsCost(n){
  if(!n) n=worthState.upgrades['master_stars_count']?.qty||0;
  let total=0;
  for(let s=0;s<n;s++){
    const sp=UPGRADES.master_stars.starPrices[s];
    if(!sp) continue;
    const saved=worthState.upgrades[sp.id];
    total+=(saved?.price||sp.defaultPrice);
  }
  return Math.round(total);
}

function calcMasterStarsCostBreakdown(n){
  if(!n) return 'No master stars';
  const parts=[];
  for(let s=0;s<n;s++){
    const sp=UPGRADES.master_stars.starPrices[s];
    if(!sp) continue;
    const price=worthState.upgrades[sp.id]?.price||sp.defaultPrice;
    parts.push(`M${s+1}: ${fmt(price)}`);
  }
  return parts.join('  ');
}

function updateNormalStarDisplay(){
  const n=worthState.normalStarsCount||0;
  const essType=worthState.normalStarEssenceType||'WITHER_ESSENCE';
  const essPrice=worthState.essencePrices[essType]||0;
  const essPerStar=worthState.normalStarEssencePerStar||0;
  const totalCost=calcNormalStarsCost();
  const sub=el('ws-nstar-sub');
  if(sub){
    if(n>0&&essPerStar>0) sub.textContent=`${n}★ × ${essPerStar} essence × ${fmt(essPrice)} = ${fmt(totalCost)}`;
    else if(n>0) sub.textContent=`${n} stars — enter essence/star and fetch price above`;
    else sub.textContent='';
  }
  const costLbl=el('ws-cost-normal_stars');
  if(costLbl) costLbl.textContent=totalCost>0?fmt(totalCost):'';
  const epEl=el('ns-essence-price');
  if(epEl) epEl.textContent=essPrice>0?fmt(essPrice)+' each':'—';
}

function calcSectionCost(secId){
  const sec=UPGRADES[secId];
  if(!sec) return 0;
  if(secId==='normal_stars') return calcNormalStarsCost();
  if(secId==='master_stars') return calcMasterStarsCost();
  if(secId==='ult_enchants'||secId==='reg_enchants'){
    return worthState.addedEnchants.filter(e=>{
      return sec.items.some(i=>i.id===e.id);
    }).reduce((a,e)=>a+(e.price||0),0);
  }
  return sec.items.reduce((a,item)=>{
    const s=worthState.upgrades[item.id];
    if(!s||!s.qty) return a;
    return a+s.qty*(s.price||item.defaultPrice);
  },0);
}

function updateNormalStarLabels(){
  const rarity=worthState.normalStarRarity||'legendary';
  const essenceType=worthState.normalStarEssenceType||'WITHER_ESSENCE';
  const essencePrice=worthState.essencePrices[essenceType]||0;
  const costs=UPGRADES.normal_stars.essenceCosts[rarity]||UPGRADES.normal_stars.essenceCosts.legendary;
  for(let s=1;s<=5;s++){
    const sid='nstar'+s;
    const essAmt=costs[s-1];
    const cost=Math.round(essAmt*essencePrice);
    // Update label
    const qEl=el(`ws-qty-${sid}`); // stepper value
    // Update the sub label if present
    const subEl=el(`ws-sub-${sid}`);
    if(subEl) subEl.textContent=`${essAmt} essence${essencePrice>0?' = '+fmt(cost):''}`;
    // Update stored price
    if(!worthState.upgrades[sid]) worthState.upgrades[sid]={qty:0,price:cost,isLive:false};
    else worthState.upgrades[sid].price=cost;
  }
  // Update essence price display
  const epEl=el('ns-essence-price');
  if(epEl) epEl.textContent=essencePrice>0?fmt(essencePrice)+' per essence':'— (fetch bazaar prices above)';
}

  sec.items.filter(item=>!fl||item.name.toLowerCase().includes(fl)).forEach(item=>{

    left.appendChild(nm);left.appendChild(tier);

    const ts=document.createElement('select'); ts.className='enchant-tier-sel'; ts.id=`ench-tier-${item.id}`;

el('panels').addEventListener('input',e=>{

    const pid=t.id.replace('inp-qty-','');
    t.classList.toggle('error',isNaN(parseNum(t.value))&&t.value!=='');

    return;
  }

    const budget=parseNum(t.value);
    t.classList.toggle('error',isNaN(budget)&&t.value!=='');
    setBudgetStr(pid,t.value);
    if(!isNaN(budget)&&budget>0){
      const product=getProduct(pid);
      if(product){const r=calc(product);if(r.costPerShard>0){const mq=Math.floor(budget/r.costPerShard);setQtyStr(pid,String(mq));const qi=el(`inp-qty-${pid}`);if(qi)qi.value=displayNum(mq);updateDisplay(pid);setText(`budget-badge-${pid}`,`Max ${mq.toLocaleString()} shards`);}}
    } else {setText(`budget-badge-${pid}`,'Enter coins to auto-calc max shards');}
    return;
  }
  if(t.dataset.action==='set-price'){
    const v=parseNum(t.value); t.classList.toggle('error',isNaN(v)&&t.value!=='');
    if(!isNaN(v)){setPrice(t.dataset.pid,t.dataset.iid,v);updateDisplay(t.dataset.pid);reapplyBudget(t.dataset.pid);updateStockDisplay(t.dataset.pid);}
    return;
  }
  if(t.dataset.action==='set-sell'){
    const v=parseNum(t.value); t.classList.toggle('error',isNaN(v)&&t.value!=='');
    if(!isNaN(v)){setSell(t.dataset.pid,v);updateDisplay(t.dataset.pid);reapplyBudget(t.dataset.pid);}
    return;
  }
  if(t.dataset.action==='set-stock-qty'){
    const {pid,origId}=t.dataset;
    setInvQty(pid,origId,t.value);
    updateStockDisplay(pid);
    return;
  }

  // Worth price inputs
  if(t.dataset.action==='worth-price'){
    const itemId=t.dataset.itemId;
    const v=parseNum(t.value);
    if(!isNaN(v)&&v>0){
      if(!worthState.upgrades[itemId]) worthState.upgrades[itemId]={qty:0,price:v,isLive:false};
      else worthState.upgrades[itemId].price=v;
      worthState.addedEnchants.forEach(e=>{if(e.id===itemId) e.price=v;});
      saveWorthPrice(itemId,v); // persist to localStorage immediately
    }
    updateWorthSummary();
    return;
  }

  // Enchant search
  if(t.dataset.action==='enchant-search'){
    const secId=t.dataset.section;
    const list=el(`enchant-list-${secId}`); if(!list) return;
    buildEnchantList(secId,t.value,list);
    return;
  }
});

el('panels').addEventListener('click',async e=>{
  const b=e.target.closest('[data-action]'); if(!b) return;
  const action=b.dataset.action;

  // ── Inventory toggle ──
  if(action==='inv-toggle'||b.id&&b.id.startsWith('inv-toggle-')){return;} // handled via change
  // toggle handled below via change event on checkbox

  if(action==='fetch-bazaar'){
    const pid=b.dataset.pid;
    const st=el(`bazaar-status-${pid}`);
    b.classList.add('loading'); b.textContent='⟳ Fetching...';
    st.className='bazaar-status'; st.textContent='Connecting...';
    try{
      const res=await fetch('https://api.hypixel.net/v2/skyblock/bazaar');
      if(!res.ok) throw new Error('HTTP '+res.status);
      const data=await res.json();
      if(!data.success) throw new Error('API error');
      const product=getProduct(pid); if(!product) throw new Error('No product');
      let updated=0;
      // Update ingredient prices
      product.ingredients.forEach((origIng,idx)=>{
        // Fetch both base and alt ingredient prices for ingredients with altId
        const idsToFetch=origIng.altId?[origIng.id,origIng.altId]:[origIng.id];
        idsToFetch.forEach(iid=>{
          const bk=BAZAAR_MAP[iid]; if(!bk) return;
          const prod=data.products[bk]; if(!prod) return;
          let bp=0;
          // sell_summary = buy orders = instasell price = lower price (what we want for ingredient cost)
          if(prod.sell_summary&&prod.sell_summary.length>0) bp=prod.sell_summary[0].pricePerUnit;
          else if(prod.quick_status?.sellPrice) bp=prod.quick_status.sellPrice;
          if(bp>0){
            local.prices[`${pid}__${iid}`]=bp; saveLocal();
            const inp=el(`inp-price-${pid}-${iid}`);
            if(inp) inp.value=fmtPrice(bp);
            updated++;
          }
        });
        // Also update the alt price label beneath toggle if present
        if(origIng.altId){
          const isAlt=getAltChoice(pid,origIng.id)==='alt';
          const altPriceLbl=el(`alt-price-lbl-${pid}-${origIng.id}`);
          if(altPriceLbl) altPriceLbl.textContent=(isAlt?origIng.name:origIng.altName)+': '+displayNum(getPrice(pid,isAlt?origIng.id:origIng.altId));
        }
      });
      // ── NEW: Also update sell price ──
      const sellKey=product.bazaarSell;
      if(sellKey&&data.products[sellKey]){
        const sp=data.products[sellKey];
        let sellP=0;
        // buy_summary = sell offers = instabuy price = higher price (what buyers pay you when you sell)
        if(sp.buy_summary&&sp.buy_summary.length>0) sellP=sp.buy_summary[0].pricePerUnit;
        else if(sp.quick_status?.buyPrice) sellP=sp.quick_status.buyPrice;
        if(sellP>0){
          setSell(pid,sellP);
          const si=el(`inp-sell-${pid}`);
          if(si) si.value=Number.isInteger(sellP)?displayNum(sellP):sellP.toFixed(1);
          updated++;
        }
      }
      updateDisplay(pid);
      reapplyBudget(pid);
      if(isInvMode(pid)) updateInvDisplay(pid);
      st.className='bazaar-status ok'; st.textContent=`✓ Updated ${updated} price${updated!==1?'s':''}`;
    }catch(err){st.className='bazaar-status err';st.textContent='✗ '+err.message;console.error(err);}
    b.classList.remove('loading'); b.textContent='⟳ Fetch Live Bazaar Prices';
    return;
  }

  // ── Worth: fetch bazaar ──
  if(action==='worth-fetch-bazaar'){
    const st=el('worth-bazaar-status');
    b.classList.add('loading'); b.textContent='⟳ Fetching...';
    st.className='bazaar-status'; st.textContent='Connecting...';
    try{
      const res=await fetch('https://api.hypixel.net/v2/skyblock/bazaar');
      if(!res.ok) throw new Error('HTTP '+res.status);
      const data=await res.json();
      if(!data.success) throw new Error('API error');
      let updated=0;
      // Go through all upgrade items with a bazaarKey
      for(const sec of Object.values(UPGRADES)){
        for(const item of sec.items){
          if(!item.bazaarKey) continue;
          const prod=data.products[item.bazaarKey]; if(!prod) continue;
          let bp=0;
          if(prod.sell_summary&&prod.sell_summary.length>0) bp=prod.sell_summary[0].pricePerUnit;
          else if(prod.quick_status?.sellPrice) bp=prod.quick_status.sellPrice;
          if(bp>0){
            if(!worthState.upgrades[item.id]) worthState.upgrades[item.id]={qty:(worthState.upgrades[item.id]?.qty||0),price:bp,isLive:true};
            else {worthState.upgrades[item.id].price=bp;worthState.upgrades[item.id].isLive=true;}
            worthState.livePrices[item.bazaarKey]=bp;
            const inp=el(`ws-price-${item.id}`);
            if(inp){inp.value=Number.isInteger(bp)?displayNum(bp):bp.toFixed(1);inp.classList.add('live');}
            // update enchant if added
            worthState.addedEnchants.forEach(e=>{if(e.id===item.id){e.price=bp;e.isLive=true;}});
            saveWorthPrice(item.id,bp);
            updated++;
          }
        }
      }
      // Fetch essence prices (buy_summary = instabuy, you're buying essence)
      for(const [name,key] of Object.entries(UPGRADES.normal_stars.essenceTypes)){
        const ep=data.products[key]; if(!ep) continue;
        let bp=0;
        if(ep.buy_summary&&ep.buy_summary.length>0) bp=ep.buy_summary[0].pricePerUnit;
        if(bp>0) worthState.essencePrices[key]=bp;
      }
      // Fetch master star prices
      for(const sp of UPGRADES.master_stars.starPrices){
        const mp=data.products[sp.bazaarKey]; if(!mp) continue;
        let bp=0;
        if(mp.sell_summary&&mp.sell_summary.length>0) bp=mp.sell_summary[0].pricePerUnit; // instasell = lower price to buy
        if(bp>0){
          if(!worthState.upgrades[sp.id]) worthState.upgrades[sp.id]={qty:0,price:bp,isLive:true};
          else {worthState.upgrades[sp.id].price=bp;worthState.upgrades[sp.id].isLive=true;}
          updated++;
        }
      }
      updateNormalStarDisplay();
      updateWorthSummary();
      // Re-render enchant chips to reflect new prices
      ['ult_enchants','reg_enchants'].forEach(s=>renderEnchantChips(s));
      st.className='bazaar-status ok'; st.textContent=`✓ Updated ${updated} live prices`;
    }catch(err){st.className='bazaar-status err';st.textContent='✗ '+err.message;}
    b.classList.remove('loading'); b.textContent='⟳ Fetch Live Prices';
    return;
  }

  // ── Worth: reset ──
  if(action==='worth-save-price'){
    const itemId=b.dataset.itemId;
    const inp=el(`ws-price-${itemId}`);
    const v=parseNum(inp?.value||'');
    if(isNaN(v)||v<=0){alert('Enter a valid price first.');return;}
    b.classList.add('saving'); b.textContent='Saving...';
    await saveWorthPrice(itemId,v);
    b.classList.remove('saving'); b.textContent='✓ Saved'; b.classList.add('saved');
    setTimeout(()=>{b.classList.remove('saved');b.textContent='Save';},2500);
    return;
  }

  if(action==='worth-reset'){
    if(!confirm('Reset all Item Worth upgrades?')) return;
    worthState.upgrades={};worthState.addedEnchants=[];worthState.itemName='';worthState.margin=20;
    worthState.baseItemCost=0;worthState.baseItemTag='';worthState.auctionPrice=0;
    worthState.normalStarsCount=0;worthState.normalStarEssencePerStar=0;
    renderAll(); return;
  }

  // ── AH Import ──
  if(action==='ah-import'){
    const inp=el('ah-url-inp'); if(!inp) return;
    const raw=inp.value.trim();
    if(!raw){ setAhStatus('Paste a Brandonfowler.me link or auction UUID first.','err'); return; }
    const uuid=extractAuctionUUID(raw);
    if(!uuid){ setAhStatus('Could not find a valid auction UUID in that link.','err'); return; }
    const btn=el('ah-import-btn'); if(btn){btn.classList.add('loading');btn.textContent='⟳ Fetching...';}
    setAhStatus('Fetching auction from Hypixel API...','loading');
    try{
      // Hypixel auction API — no key needed for public auctions
      // Use Coflnet API — no API key required
      const res=await fetch(`https://sky.coflnet.com/api/auction/${uuid}`);
      if(!res.ok) throw new Error('HTTP '+res.status+' — auction may have expired or UUID is wrong');
      const auc=await res.json();
      // Coflnet also provides a flat lore string via /api/auction/{uuid}/details
      let lore='';
      try{
        const detRes=await fetch(`https://sky.coflnet.com/api/auction/${uuid}/details`);
        if(detRes.ok){ const det=await detRes.json(); lore=det.description||det.lore||det.itemLore||''; }
      }catch(le){ console.warn('Lore fetch failed, using enchantments array',le); }
      const itemName=stripCodes(auc.itemName||auc.item_name||'');
      const rawTag=inferItemTag(auc.itemName||auc.item_name||itemName);
      worthState.itemImageUrl=`https://sky.coflnet.com/static/icon/${encodeURIComponent(rawTag)}`;
      const auctionPrice=auc.startingBid||auc.starting_bid||0;
      // If we got lore, parse it; if not, build from the enchantments array Coflnet provides
      if(!lore&&auc.enchantments&&auc.enchantments.length){
        // Coflnet returns enchantments as [{type:"sharpness",level:6}, ...]
        lore = auc.enchantments.map(e=>e.type.replace(/_/g,' ')+' '+e.level).join('\n');
      }
      worthState.itemName=itemName;
      worthState.auctionPrice=auctionPrice;
      // Parse lore
      const parsed=parseLore(lore);
      // Apply to worthState
      // Reset upgrades first (keep live prices)
      worthState.upgrades={};worthState.addedEnchants=[];
      // HPB
      if(parsed.hpb>0){ worthState.upgrades['hpb']={qty:parsed.hpb,price:worthState.upgrades['hpb']?.price||UPGRADES.hpb.items[0].defaultPrice,isLive:false}; }
      if(parsed.fphb>0){ worthState.upgrades['fphb']={qty:parsed.fphb,price:worthState.upgrades['fphb']?.price||UPGRADES.hpb.items[1].defaultPrice,isLive:false}; }
      // Recomb
      if(parsed.recomb){ worthState.upgrades['recomb']={qty:1,price:worthState.upgrades['recomb']?.price||UPGRADES.recomb.items[0].defaultPrice,isLive:false}; }
      // Stars
      for(let s=1;s<=Math.min(parsed.stars,5);s++){
        const sid='star'+s;
        const sitem=UPGRADES.stars.items[s-1];
        worthState.upgrades[sid]={qty:1,price:worthState.upgrades[sid]?.price||sitem.defaultPrice,isLive:false};
      }
      // Scrolls
      const scrollMap={'Shadow Assassin Scroll':'scroll_sa','Juju Shortbow Scroll':'scroll_jc','Necromancer Scroll':'scroll_necro','Livid Dagger Scroll':'scroll_livid'};
      for(const sName of parsed.scrolls){
        const sid=scrollMap[sName]; if(!sid) continue;
        const sitem=UPGRADES.scrolls.items.find(i=>i.id===sid); if(!sitem) continue;
        const cur=worthState.upgrades[sid];
        worthState.upgrades[sid]={qty:(cur?.qty||0)+1,price:cur?.price||sitem.defaultPrice,isLive:false};
      }
      // Enchants — merge lore-parsed + Coflnet structured enchantments array
      const encSeen=new Set();
      const mergedEnchants=[...parsed.enchants];
      if(auc.enchantments&&auc.enchantments.length){
        for(const ce of auc.enchantments){
          const name=(ce.type||'').replace(/_/g,' ').replace(/\b\w/g,x=>x.toUpperCase());
          const tier=ce.level||1;
          const key=name.toLowerCase()+'_'+tier;
          if(!mergedEnchants.some(e=>e.name.toLowerCase()===name.toLowerCase())) mergedEnchants.push({name,tier});
        }
      }
      for(const enc of mergedEnchants){
        const match=matchEnchant(enc.name,enc.tier);
        if(!match) continue;
        const uid=match.item.id+'_'+Date.now()+'_'+Math.random();
        const price=worthState.upgrades[match.item.id]?.price||match.item.defaultPrice||0;
        worthState.addedEnchants.push({uid,id:match.item.id,name:match.item.name,tier:match.tier,price,isLive:false});
      }
      // Item name input
      const ni=el('worth-item-name'); if(ni) ni.value=itemName;
      // Show parsed preview
      const previewLines=[
        `Item: ${itemName}`,
        `Listed price: ${fmt(auctionPrice)}`,
        parsed.hpb||parsed.fphb ? `HPBs: ${parsed.hpb} Hot Potato + ${parsed.fphb} Fuming` : null,
        parsed.recomb ? 'Recombobulated: yes' : null,
        parsed.stars ? `Stars: ${parsed.stars}✪` : null,
        parsed.scrolls.length ? `Scrolls: ${parsed.scrolls.join(', ')}` : null,
        parsed.enchants.length ? `Enchants detected: ${parsed.enchants.length} (${parsed.enchants.slice(0,4).map(e=>e.name+' T'+e.tier).join(', ')}${parsed.enchants.length>4?'…':''})` : null,
      ].filter(Boolean);
      const prev=el('ah-parsed-preview');
      if(prev){
        prev.className='ah-parsed-preview visible';
        prev.innerHTML=previewLines.map(l=>`<div class="ah-parsed-row"><span class="ah-parsed-label">${l.split(':')[0]}</span><span class="ah-parsed-val accent">${l.split(':').slice(1).join(':').trim()}</span></div>`).join('');
      }
      // Floor price lookup via Coflnet
      const tag=inferItemTag(auc.item_name||itemName);
      worthState.baseItemTag=tag;
      worthState.itemImageUrl=`https://sky.coflnet.com/static/icon/${encodeURIComponent(tag)}`;
      setAhStatus(`✓ Parsed! Fetching clean floor price for ${tag}...`,'ok');
      try{
        const fres=await fetch(`https://sky.coflnet.com/api/auctions/tag/${encodeURIComponent(tag)}/active/bin?page=0`);
        if(fres.ok){
          const fdata=await fres.json();
          // Sort by price ascending — lowest BIN first (fine if it has regular enchants)
          if(fdata&&fdata.length){
            const floors=fdata.filter(a=>a.startingBid>0).sort((a,b)=>a.startingBid-b.startingBid);
            if(floors.length){
              worthState.baseItemCost=floors[0].startingBid;
              const floorBox=el('ah-floor-box');
              if(floorBox){floorBox.style.display='flex';floorBox.querySelector('.floor-val').textContent=fmt(worthState.baseItemCost);floorBox.querySelector('.floor-sub').textContent=`Lowest clean BIN for ${tag}`;}
              setAhStatus(`✓ Done! Upgrades auto-filled. Clean floor: ${fmt(worthState.baseItemCost)}`,'ok');
            }
          }
        }
      }catch(fe){console.warn('Floor price lookup failed:',fe);}
      updateWorthSummary();
      renderAll();
    }catch(err){
      setAhStatus('✗ '+err.message,'err');
      console.error('AH import error:',err);
    }
    if(btn){btn.classList.remove('loading');btn.textContent='⟳ Import';}
    return;
  }

  // ── Worth: toggle section ──
  if(action==='toggle-worth-section'){
    const secId=b.dataset.section;
    const body=el(`ws-body-${secId}`);
    const chev=el(`ws-chev-${secId}`);
    if(body){body.classList.toggle('open');if(chev)chev.classList.toggle('open');}
    return;
  }

  // ── Worth: stepper ──
  if(action==='worth-mstar-step'){
    const delta=parseInt(b.dataset.delta);
    const cur=worthState.upgrades['master_stars_count']?.qty||0;
    const nw=Math.max(0,Math.min(5,cur+delta));
    if(!worthState.upgrades['master_stars_count']) worthState.upgrades['master_stars_count']={qty:nw,price:0};
    else worthState.upgrades['master_stars_count'].qty=nw;
    const qEl=el('ws-qty-master_stars_count'); if(qEl) qEl.textContent=nw;
    const sub=el('ws-mstar-sub'); if(sub) sub.textContent=calcMasterStarsCostBreakdown(nw);
    const costLbl=el('ws-cost-master_stars'); if(costLbl) costLbl.textContent=nw>0?fmt(calcMasterStarsCost(nw)):'';
    updateWorthSummary();
    return;
  }
  if(action==='worth-nstar-step'){
    const delta=parseInt(b.dataset.delta);
    const cur=worthState.normalStarsCount||0;
    worthState.normalStarsCount=Math.max(0,Math.min(5,cur+delta));
    const qEl=el('ws-qty-normal_stars_count'); if(qEl) qEl.textContent=worthState.normalStarsCount;
    updateNormalStarDisplay();
    updateWorthSummary();
    return;
  }
  if(action==='worth-step'){
    const itemId=b.dataset.itemId;
    const delta=parseInt(b.dataset.delta);
    const max=parseInt(b.dataset.max)||1;
    // Find default price
    let defPrice=0;
    for(const sec of Object.values(UPGRADES)){
      const found=sec.items.find(i=>i.id===itemId);
      if(found){defPrice=found.defaultPrice;break;}
    }
    if(!worthState.upgrades[itemId]) worthState.upgrades[itemId]={qty:0,price:defPrice,isLive:false};
    const s=worthState.upgrades[itemId];
    s.qty=Math.max(0,Math.min(max,s.qty+delta));
    const qEl=el(`ws-qty-${itemId}`); if(qEl) qEl.textContent=s.qty;
    const costEl=el(`ws-cost-${itemId}`); if(costEl){costEl.textContent=s.qty>0?fmt(s.qty*(s.price||defPrice)):'';costEl.className='price-tag'+(s.qty>0?' has-val':'');}
    updateWorthSummary();
    return;
  }

  // ── Worth: add enchant ──
  if(action==='add-enchant'){
    const itemId=b.dataset.itemId;
    const secId=b.dataset.section;
    const sec=UPGRADES[secId];
    const item=sec.items.find(i=>i.id===itemId); if(!item) return;
    const tierEl=el(`ench-tier-${itemId}`);
    const tier=tierEl?parseInt(tierEl.value):item.maxTier;
    const priceEl=el(`ws-price-${itemId}`);
    const price=parseNum(priceEl?.value)||item.defaultPrice||0;
    const uid=itemId+'_'+Date.now();
    worthState.addedEnchants.push({uid,id:itemId,name:item.name,tier,price,isLive:worthState.upgrades[itemId]?.isLive||false});
    if(!worthState.upgrades[itemId]) worthState.upgrades[itemId]={qty:1,price,isLive:false};
    if(price>0) saveWorthPrice(itemId,price); // persist price
    updateWorthSummary();
    renderEnchantChips(secId);
    return;
  }

  // ── Worth: remove enchant ──
  if(action==='remove-enchant'){
    const uid=b.dataset.enchantId;
    const e=worthState.addedEnchants.find(x=>x.uid===uid);
    worthState.addedEnchants=worthState.addedEnchants.filter(x=>x.uid!==uid);
    updateWorthSummary();
    if(e){
      // find section
      for(const [secId,sec] of Object.entries(UPGRADES)){
        if(sec.items.some(i=>i.id===e.id)){renderEnchantChips(secId);break;}
      }
    }
    return;
  }

  // ── Log flip ──
  if(action==='log-flip-inline'){
    const pid=b.dataset.pid;
    const product=getProduct(pid); if(!product) return;
    const r=calc(product);
    if(r.qty<=0||r.sellPrice<=0){alert('Set a qty and sell price first.');return;}
    const noteInp=el(`log-note-inline-${pid}`);
    const note=noteInp?.value.trim()||'';
    const statusEl=el(`log-flip-status-${pid}`);
    b.disabled=true; b.textContent='Saving...';
    const flip={id:Date.now(),productId:pid,productName:product.name,qty:Math.round(r.qty),sellPrice:Math.round(r.sellPrice),costPerShard:Math.round(r.costPerShard),note,date:new Date().toISOString()};
    remoteData.flips.push(flip);
    const ok=await ghWrite(remoteData);
    if(ok){
      if(statusEl){statusEl.textContent='✓ Logged!';statusEl.className='log-flip-status ok';}
      if(noteInp) noteInp.value='';
      // Update sub text with new qty info
      const subEl=b.closest('.log-flip-box')?.querySelector('.log-flip-sub');
      if(subEl) subEl.textContent=`Saves current qty (${r.qty.toLocaleString()}) at ${fmt(r.sellPrice)}/shard to your Flip Log.`;
      setTimeout(()=>{if(statusEl){statusEl.textContent='';statusEl.className='log-flip-status';}},3000);
    } else {
      remoteData.flips.pop();
      if(statusEl){statusEl.textContent='✗ Save failed';statusEl.className='log-flip-status err';}
    }
    b.disabled=false; b.textContent='📋 Log Flip';
    return;
  }

  if(action==='log-flip'){
    const pid=el('log-product')?.value;
    const qty=parseNum(el('log-qty')?.value||'');
    const sell=parseNum(el('log-sell')?.value||'');
    const cost=parseNum(el('log-cost')?.value||'');
    const note=el('log-note')?.value.trim()||'';
    const errEl=el('log-err'); errEl.style.display='none';
    if(!pid||isNaN(qty)||qty<=0){errEl.textContent='Enter a valid qty.';errEl.style.display='block';return;}
    if(isNaN(sell)||sell<=0){errEl.textContent='Enter a valid sell price.';errEl.style.display='block';return;}
    if(isNaN(cost)||cost<0){errEl.textContent='Enter a valid cost per shard.';errEl.style.display='block';return;}
    const product=getProduct(pid);
    const flip={id:Date.now(),productId:pid,productName:product?.name||pid,qty:Math.round(qty),sellPrice:Math.round(sell),costPerShard:Math.round(cost),note,date:new Date().toISOString()};
    remoteData.flips.push(flip);
    const ok=await ghWrite(remoteData);
    if(ok){el('log-qty').value='';el('log-sell').value='';el('log-note').value='';el('log-preview').textContent='Fill in the fields above to preview profit';refreshLogStats();}
    else{remoteData.flips.pop();errEl.textContent='Failed to save. Check your token.';errEl.style.display='block';}
    return;
  }

  if(action==='delete-flip'){
    if(!ghToken){alert('Need a token to delete flips.');return;}
    const i=parseInt(b.dataset.flipIndex);
    if(!confirm('Delete this flip?')) return;
    remoteData.flips.splice(i,1);
    const ok=await ghWrite(remoteData);
    if(ok) refreshLogStats();
    else{remoteData.flips.splice(i,0,remoteData.flips[i]);alert('Save failed.');}
    return;
  }

  if(action==='delete-product'){
    if(!ghToken){alert('Need a token to delete products.');return;}
    const pid=b.dataset.pid;
    if(!confirm('Remove this product?')) return;
    remoteData.products=remoteData.products.filter(p=>p.id!==pid);
    if(local.activeTab===pid) local.activeTab=remoteData.products[0]?.id||'__manage__';
    await ghWrite(remoteData); saveLocal(); renderAll();
    return;
  }

  if(action==='add-ing-row'){
    const c=el('ing-fields');
    const row=document.createElement('div'); row.className='form-row ing-field-row';
    row.innerHTML='<div class="form-field"><label>Ingredient</label><input type="text" class="ing-name-inp" placeholder="e.g. Pest" autocomplete="off" /></div><div class="form-field"><label>Per 1 output</label><input type="number" class="ing-per-inp" placeholder="6.25" step="0.01" style="min-width:100px;" /></div><div class="form-field"><label>Default price</label><input type="text" class="ing-price-inp" placeholder="36k" autocomplete="off" style="min-width:100px;" /></div><button class="btn btn-ghost btn-sm" style="align-self:flex-end;" data-action="remove-ing-row">×</button>';
    c.appendChild(row); return;
  }
  if(action==='remove-ing-row'){
    const rows=document.querySelectorAll('.ing-field-row');
    if(rows.length>1) b.closest('.ing-field-row').remove(); return;
  }

  if(action==='add-product'){
    if(!ghToken){alert('Need a GitHub token to add products.');return;}
    const name=el('new-name')?.value.trim();
    const chain=el('new-chain')?.value.trim();
    const sell=parseNum(el('new-sell')?.value)||0;
    const errEl=el('add-error'); errEl.style.display='none';
    if(!name){errEl.textContent='Product name required.';errEl.style.display='block';return;}
    let baseSlug=slugify(name),id=baseSlug,n=1;
    while(getProduct(id)){id=`${baseSlug}-${n++}`;}
    const rows=document.querySelectorAll('.ing-field-row');
    const ingredients=[],defaultPrices={sell:Math.round(sell)};
    for(const row of rows){
      const nm=row.querySelector('.ing-name-inp').value.trim();
      const per=parseFloat(row.querySelector('.ing-per-inp').value);
      const pr=parseNum(row.querySelector('.ing-price-inp').value)||0;
      if(!nm||isNaN(per)){errEl.textContent='Each ingredient needs a name and qty.';errEl.style.display='block';return;}
      const iid=slugify(nm); ingredients.push({id:iid,name:nm,perUnit:per}); defaultPrices[iid]=Math.round(pr);
    }
    if(!ingredients.length){errEl.textContent='Add at least one ingredient.';errEl.style.display='block';return;}
    const newP={id,name,chain:chain||name,ingredients,defaultPrices};
    remoteData.products.push(newP);
    ingredients.forEach(ing=>{local.prices[`${id}__${ing.id}`]=defaultPrices[ing.id];});
    local.prices[`${id}__sell`]=Math.round(sell);
    local.qtys[id]='64';
    const ok=await ghWrite(remoteData);
    if(ok){saveLocal();local.activeTab=id;renderAll();}
    else{remoteData.products.pop();errEl.textContent='Save failed. Check your token.';errEl.style.display='block';}
    return;
  }
});

// ── Inventory toggle via change event ──
el('panels').addEventListener('change',e=>{
  const t=e.target;
  if(t.id&&t.id.startsWith('inv-toggle-')){
    const pid=t.id.replace('inv-toggle-','');
    setInvMode(pid,t.checked);
    const normalWrap=el(`normal-wrap-${pid}`);
    const invPanel=el(`inv-panel-${pid}`);
    if(normalWrap) normalWrap.style.display=t.checked?'none':'block';
    if(invPanel){invPanel.className='inv-panel'+(t.checked?' visible':'');}
    return;
  }
  // Alt ingredient toggle (e.g. Bambuleaf vs Mochibear on Pandarai)
  if(t.dataset.action==='toggle-alt-ing'){
    const {pid,origId}=t.dataset;
    setAltChoice(pid,origId,t.checked?'alt':'base');
    // Update name label
    const product=getProduct(pid); if(!product) return;
    const ing=product.ingredients.find(i=>i.id===origId); if(!ing||!ing.altId) return;
    const isAlt=t.checked;
    const nameEl=el(`ing-name-${pid}-${origId}`); if(nameEl) nameEl.textContent=isAlt?ing.altName:ing.name;
    // Update the alt label text beside toggle
    const altLbl=el(`alt-lbl-${pid}-${origId}`); if(altLbl) altLbl.textContent=isAlt?ing.altName:ing.name;
    // Update the price label for inactive ing
    const altPriceLbl=el(`alt-price-lbl-${pid}-${origId}`); if(altPriceLbl) altPriceLbl.textContent=(isAlt?ing.name:ing.altName)+': '+displayNum(getPrice(pid,isAlt?ing.id:ing.altId));
    // Swap which price input is shown (re-id the active input)
    const activeInp=el(`inp-price-${pid}-${isAlt?ing.altId:ing.id}`);
    const inactiveInp=el(`inp-price-${pid}-${isAlt?ing.id:ing.altId}`);
    if(activeInp){ activeInp.id=`inp-price-${pid}-${isAlt?ing.altId:ing.id}`; activeInp.dataset.iid=isAlt?ing.altId:ing.id; activeInp.value=displayNum(getPrice(pid,isAlt?ing.altId:ing.id)); }
    // Update stock section label for this ingredient
    const stockLbl=el(`stock-lbl-${pid}-${origId}`);
    if(stockLbl) stockLbl.textContent=(isAlt?ing.altName:ing.name)+' I have';
    updateDisplay(pid);
    reapplyBudget(pid);
    updateStockDisplay(pid);
    return;
  }
});

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function secLabel(text){const e=document.createElement('div');e.className='section-label';e.textContent=text;return e;}
function makeSmartInput(id,val,placeholder=''){
  const i=document.createElement('input');i.className='smart-input';i.type='text';
  i.id=id;i.value=val||'';i.autocomplete='off';if(placeholder)i.placeholder=placeholder;return i;
}
function inputGroupEl(label,sub,inputId,val){
  const g=document.createElement('div');g.className='input-group';
  const left=document.createElement('div');
  const lbl=document.createElement('div');lbl.className='input-group-label';lbl.textContent=label;
  const s=document.createElement('div');s.className='input-group-sub';s.textContent=sub;
  left.appendChild(lbl);left.appendChild(s);
  const inp=makeSmartInput(inputId,val);
  g.appendChild(left);g.appendChild(inp);return g;
}

// ─── BOOT ────────────────────────────────────────────────────────────────────
(async()=>{
  const remote=await ghRead();
  if(remote) applyRemote(remote);
  if(local.activeTab!=='__manage__'&&local.activeTab!=='__log__'&&local.activeTab!=='__worth__'&&!getProduct(local.activeTab)){
    local.activeTab=remoteData.products[0]?.id||'__manage__';saveLocal();
  }
  restoreWorthPrices(); // load saved item worth prices from localStorage
  renderAll();
})();
</script>
