<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shard Flip Calculator</title>
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c24;
    --border: #252a36;
    --border2: #2e3545;
    --text: #f0f2fa;
    --muted: #8b95aa;
    --accent: #7ee8b8;
    --accent2: #4fd1c5;
    --gold: #f6c90e;
    --red: #ff5e5e;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 17px;
    font-weight: 400;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(126,232,184,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(126,232,184,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; max-width: 1300px; margin: 0 auto; padding: 0 36px 120px; }

  header {
    padding: 56px 0 44px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
  }
  .logo { font-size: 36px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
  .logo span { color: var(--accent); }
  .logo-sub { font-size: 13px; color: var(--muted); margin-top: 6px; letter-spacing: 0.05em; }

  .tabs {
    display: flex;
    gap: 5px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 5px;
    flex-wrap: wrap;
  }
  .tab {
    padding: 11px 22px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
    border: none;
    background: none;
    font-family: inherit;
    white-space: nowrap;
  }
  .tab:hover { color: var(--text); }
  .tab.active { background: var(--surface2); color: var(--accent); border: 1px solid var(--border2); }
  .tab-add { color: var(--accent); border: 1px dashed var(--border2); }
  .tab-add:hover { background: var(--surface2); }

  .panel { display: none; }
  .panel.active { display: block; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .product-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 36px;
  }
  .product-title { font-size: 34px; font-weight: 700; color: var(--text); }
  .chain-badge {
    font-size: 13px;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    line-height: 1.9;
    max-width: 640px;
    letter-spacing: 0.01em;
  }
  .chain-badge .arrow { color: var(--accent); font-weight: 600; }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin: 32px 0 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .grid-4 { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 18px; margin-bottom: 24px; }
  @media (max-width: 860px) { .grid-4 { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 500px) { .grid-4 { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 26px;
  }
  .card-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .card-val { font-size: 36px; font-weight: 700; color: var(--text); line-height: 1; }
  .card-val.accent { color: var(--accent); }
  .card-val.gold { color: var(--gold); }
  .card-val.red { color: var(--red); }
  .card-sub { font-size: 13px; color: var(--muted); margin-top: 8px; font-weight: 400; }

  /* Cost per shard — bigger prominent display */
  .cost-per-shard-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 26px 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 24px;
  }
  .cps-label { font-size: 13px; font-weight: 600; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
  .cps-val { font-size: 44px; font-weight: 700; line-height: 1; }
  .cps-val.pos { color: var(--accent); }
  .cps-val.neg { color: var(--red); }
  .cps-sub { font-size: 14px; color: var(--muted); margin-top: 6px; }

  .input-group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .input-group-label { font-size: 18px; font-weight: 500; color: var(--text); flex: 1; min-width: 160px; }
  .input-group-sub { font-size: 13px; color: var(--muted); margin-top: 4px; font-weight: 400; }

  .smart-input {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    color: var(--text);
    font-size: 20px;
    font-weight: 600;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 12px 18px;
    width: 160px;
    text-align: right;
    transition: border-color 0.15s;
    outline: none;
  }
  .smart-input:focus { border-color: var(--accent); }
  .smart-input.error { border-color: var(--red); }

  .ingredients {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  .ing-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .ing-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    gap: 16px;
    flex-wrap: wrap;
  }
  .ing-row:last-child { border-bottom: none; }
  .ing-name { font-size: 18px; font-weight: 500; min-width: 160px; color: var(--text); }
  .ing-right { display: flex; align-items: center; gap: 28px; flex-wrap: wrap; }
  .ing-qty { font-size: 20px; font-weight: 600; color: var(--accent); min-width: 80px; text-align: right; }
  .ing-cost { font-size: 15px; color: var(--muted); min-width: 110px; text-align: right; font-weight: 400; }

  .profit-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-top: 24px;
  }
  .profit-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
  }
  .profit-row:last-child { border-bottom: none; background: var(--surface2); }
  .profit-row .label { font-size: 13px; font-weight: 600; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .profit-row .val { font-size: 22px; font-weight: 700; }
  .profit-row .val.pos { color: var(--accent); }
  .profit-row .val.neg { color: var(--red); }

  /* Manage */
  .manage-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 32px; margin-bottom: 24px; }
  .manage-panel h3 { font-size: 22px; font-weight: 600; margin-bottom: 24px; color: var(--text); }
  .form-row { display: flex; align-items: flex-end; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
  .form-field { display: flex; flex-direction: column; gap: 7px; }
  .form-field label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .form-field input, .form-field select {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    color: var(--text);
    font-size: 16px;
    font-family: inherit;
    font-weight: 400;
    padding: 11px 16px;
    outline: none;
    min-width: 160px;
  }
  .form-field input:focus, .form-field select:focus { border-color: var(--accent); }
  .btn { padding: 12px 24px; border-radius: 10px; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-accent { background: var(--accent); color: #0a0c10; }
  .btn-accent:hover { background: var(--accent2); }
  .btn-danger { background: rgba(255,94,94,0.12); color: var(--red); border: 1px solid rgba(255,94,94,0.3); }
  .btn-danger:hover { background: rgba(255,94,94,0.22); }
  .btn-ghost { background: var(--surface2); color: var(--muted); border: 1px solid var(--border2); }
  .btn-ghost:hover { color: var(--text); }

  .product-list-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: 10px; background: var(--surface2);
  }
  .product-list-item .name { font-size: 17px; font-weight: 500; color: var(--text); }
  .product-list-item .chain-mini { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .alert { background: rgba(255,94,94,0.08); border: 1px solid rgba(255,94,94,0.3); border-radius: 10px; padding: 14px 18px; font-size: 14px; color: var(--red); margin-top: 14px; display: none; }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div>
      <div class="logo">Shard <span>Flip</span> Calculator</div>
      <div class="logo-sub">HYPIXEL SKYBLOCK FUSION CALCULATOR</div>
    </div>
    <div class="tabs" id="tabBar"></div>
  </header>
  <div id="panels"></div>
</div>

<script>
// ─── PARSE k/m ───────────────────────────────────────────────────────────────
function parseNum(s) {
  if (s === '' || s == null) return NaN;
  const m = String(s).trim().toLowerCase().match(/^([0-9]*\.?[0-9]+)\s*([km]?)$/);
  if (!m) return NaN;
  let n = parseFloat(m[1]);
  if (m[2] === 'k') n *= 1e3;
  if (m[2] === 'm') n *= 1e6;
  return n;
}
function displayNum(n) {
  if (!n && n !== 0) return '';
  if (n >= 1e6) return (n/1e6 % 1 === 0 ? n/1e6 : parseFloat((n/1e6).toFixed(3))) + 'm';
  if (n >= 1e3) return (n/1e3 % 1 === 0 ? n/1e3 : parseFloat((n/1e3).toFixed(2))) + 'k';
  return String(Math.round(n));
}
function fmt(n) {
  if (isNaN(n) || n == null) return '—';
  const a = Math.abs(n);
  if (a >= 1e9) return (n/1e9).toFixed(2) + 'B';
  if (a >= 1e6) return (n/1e6).toFixed(2) + 'M';
  if (a >= 1e3) return (n/1e3).toFixed(1) + 'k';
  return Math.round(n).toLocaleString();
}
function fmtCoins(n) { return fmt(n) + ' 🪙'; }

// ─── DEFAULT DATA ────────────────────────────────────────────────────────────
const DEFAULTS = [
  {
    id: 'stalagmite', name: 'Stalagmite',
    chain: 'MZ + Chill → Trog → Trog + MZ → Quartzfang → QF + MZ → Stalagmite',
    ingredients: [
      { id: 'mz', name: 'Miner Zombie', perUnit: 1560/64 },
      { id: 'chill', name: 'Chill', perUnit: 1000/64 },
    ],
    defaultPrices: { mz: 11000, chill: 6000, sell: 560000 }
  },
  {
    id: 'lunar_moth', name: 'Lunar Moth',
    chain: 'MZ + Invisibug → Termite → Termite + Invisibug → Ladybug → Ladybug + Invisibug → Lunar Moth',
    ingredients: [
      { id: 'mz', name: 'Miner Zombie', perUnit: 1000/64 },
      { id: 'invisibug', name: 'Invisibug', perUnit: 1560/64 },
    ],
    defaultPrices: { mz: 11000, invisibug: 23500, sell: 1030000 }
  },
  {
    id: 'cropeetle', name: 'Cropeetle',
    chain: 'Pest + Chill → Mantis → MZ + Invisibug → Termite → Mantis + Termite → Cropeetle',
    ingredients: [
      { id: 'pest', name: 'Pest', perUnit: 1000/160 },
      { id: 'chill', name: 'Chill', perUnit: 1000/160 },
      { id: 'mz', name: 'Miner Zombie', perUnit: 1000/160 },
      { id: 'invisibug', name: 'Invisibug', perUnit: 1000/160 },
    ],
    defaultPrices: { pest: 36000, chill: 6000, mz: 12000, invisibug: 25000, sell: 620000 }
  },
  {
    id: 'pandarai', name: 'Pandarai',
    chain: 'Bambuleaf OR Mochibear + Glacite Walker → Pandarai',
    ingredients: [
      { id: 'bambuleaf', name: 'Bambuleaf / Mochibear', perUnit: 1000/400 },
      { id: 'glacite', name: 'Glacite Walker', perUnit: 1000/400 },
    ],
    defaultPrices: { bambuleaf: 42000, glacite: 7500, sell: 204000 }
  },
  {
    id: 'sphinx', name: 'Sphinx',
    chain: 'Ghost + Cod → Sphinx',
    ingredients: [
      { id: 'ghost', name: 'Ghost', perUnit: 1000/200 },
      { id: 'cod', name: 'Cod', perUnit: 1000/200 },
    ],
    defaultPrices: { ghost: 15000, cod: 2500, sell: 100000 }
  },
  {
    id: 'firefly', name: 'Firefly',
    chain: 'Pest + Chill → Mantis → Mantis + Bezal → Firefly',
    ingredients: [
      { id: 'pest', name: 'Pest', perUnit: 1000/160 },
      { id: 'chill', name: 'Chill', perUnit: 1000/160 },
      { id: 'bezal', name: 'Bezal', perUnit: 400/160 },
    ],
    defaultPrices: { pest: 36000, chill: 6000, bezal: 17000, sell: 450000 }
  },
  {
    id: 'dragonfly', name: 'Dragonfly',
    chain: 'Pest + Chill → Mantis → Mantis + Bezal → Firefly → Firefly + Draconic → Dragonfly',
    ingredients: [
      { id: 'pest', name: 'Pest', perUnit: 1000/64 },
      { id: 'chill', name: 'Chill', perUnit: 1000/64 },
      { id: 'bezal', name: 'Bezal', perUnit: 400/64 },
      { id: 'draconic', name: 'Draconic', perUnit: 160/64 },
    ],
    defaultPrices: { pest: 43000, chill: 6000, bezal: 13500, draconic: 135000, sell: 1540000 }
  },
];

// ─── PERSISTENT STATE ────────────────────────────────────────────────────────
// products = list of product definitions (structure + default prices)
// prices   = { "productId_ingId": number, "productId_sell": number } — user overrides
// qtys     = { "productId": rawString } — e.g. "64", "1k"
// activeTab = string

function loadState() {
  try {
    const products = JSON.parse(localStorage.getItem('sfc2_products') || 'null') || DEFAULTS;
    const prices   = JSON.parse(localStorage.getItem('sfc2_prices')   || '{}');
    const qtys     = JSON.parse(localStorage.getItem('sfc2_qtys')     || '{}');
    const activeTab = localStorage.getItem('sfc2_active') || products[0].id;
    return { products, prices, qtys, activeTab };
  } catch(e) { return { products: DEFAULTS, prices: {}, qtys: {}, activeTab: DEFAULTS[0].id }; }
}

function saveState(state) {
  localStorage.setItem('sfc2_products', JSON.stringify(state.products));
  localStorage.setItem('sfc2_prices',   JSON.stringify(state.prices));
  localStorage.setItem('sfc2_qtys',     JSON.stringify(state.qtys));
  localStorage.setItem('sfc2_active',   state.activeTab);
}

let S = loadState();

// ─── ACCESSORS ───────────────────────────────────────────────────────────────
function getPrice(pid, iid) {
  const k = `${pid}_${iid}`;
  if (S.prices[k] !== undefined) return S.prices[k];
  const p = S.products.find(x => x.id === pid);
  return (p && p.defaultPrices && p.defaultPrices[iid]) || 0;
}
function getSell(pid) {
  const k = `${pid}_sell`;
  if (S.prices[k] !== undefined) return S.prices[k];
  const p = S.products.find(x => x.id === pid);
  return (p && p.defaultPrices && p.defaultPrices.sell) || 0;
}
function getQtyStr(pid) { return S.qtys[pid] || '64'; }
function getQty(pid) { return parseNum(getQtyStr(pid)) || 64; }

function setPrice(pid, iid, val) { S.prices[`${pid}_${iid}`] = val; saveState(S); }
function setSell(pid, val)       { S.prices[`${pid}_sell`] = val; saveState(S); }
function setQtyStr(pid, val)     { S.qtys[pid] = val; saveState(S); }

// ─── CALC ────────────────────────────────────────────────────────────────────
function calc(product) {
  const qty = getQty(product.id);
  let totalCost = 0;
  const ings = product.ingredients.map(ing => {
    const price  = getPrice(product.id, ing.id);
    const needed = Math.ceil(ing.perUnit * qty);
    const cost   = needed * price;
    totalCost += cost;
    return { ...ing, price, needed, cost };
  });
  const sellPrice      = getSell(product.id);
  const revenue        = qty * sellPrice;
  const profit         = revenue - totalCost;
  const profitPerShard = qty > 0 ? profit / qty : 0;
  const costPerShard   = qty > 0 ? totalCost / qty : 0;
  const margin         = totalCost > 0 ? profit / totalCost * 100 : 0;
  return { qty, ings, totalCost, sellPrice, revenue, profit, profitPerShard, costPerShard, margin };
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function renderAll() { renderTabs(); renderPanels(); }

function renderTabs() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = '';
  S.products.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (p.id === S.activeTab ? ' active' : '');
    btn.textContent = p.name;
    btn.onclick = () => { S.activeTab = p.id; saveState(S); renderAll(); };
    bar.appendChild(btn);
  });
  const m = document.createElement('button');
  m.className = 'tab tab-add' + (S.activeTab === '__manage__' ? ' active' : '');
  m.textContent = '+ manage';
  m.onclick = () => { S.activeTab = '__manage__'; saveState(S); renderAll(); };
  bar.appendChild(m);
}

function renderPanels() {
  const c = document.getElementById('panels');
  c.innerHTML = '';
  if (S.activeTab === '__manage__') { c.appendChild(buildManage()); return; }
  const p = S.products.find(x => x.id === S.activeTab);
  if (p) c.appendChild(buildProduct(p));
}

function buildProduct(product) {
  const div = document.createElement('div');
  div.className = 'panel active';
  const r = calc(product);

  div.innerHTML = `
    <div class="product-header">
      <div class="product-title">${product.name}</div>
      <div class="chain-badge">${product.chain.replace(/→/g, '<span class="arrow"> → </span>')}</div>
    </div>

    <div class="section-label">Target Quantity</div>
    <div class="input-group">
      <div>
        <div class="input-group-label">How many ${product.name} shards do you want?</div>
        <div class="input-group-sub">Supports 64, 1k, 2.5m — everything scales automatically</div>
      </div>
      <input class="smart-input" type="text" id="qty_inp" value="${getQtyStr(product.id)}" autocomplete="off" />
    </div>

    <div class="section-label">Ingredient Quantities &amp; Prices</div>
    <div class="ingredients">
      <div class="ing-header">
        <span>Ingredient</span>
        <div style="display:flex;gap:56px;"><span>Qty needed</span><span>Price / shard</span><span style="min-width:110px;text-align:right;">Total cost</span></div>
      </div>
      ${r.ings.map(ing => `
        <div class="ing-row">
          <div class="ing-name">${ing.name}</div>
          <div class="ing-right">
            <div class="ing-qty" id="iqty_${ing.id}">${ing.needed.toLocaleString()}</div>
            <input class="smart-input" type="text" id="iprice_${ing.id}" data-ing="${ing.id}"
              value="${displayNum(ing.price)}" autocomplete="off" style="width:130px;" />
            <div class="ing-cost" id="icost_${ing.id}">${fmtCoins(ing.cost)}</div>
          </div>
        </div>
      `).join('')}
    </div>

    <div class="section-label">Sell Price &amp; Profit</div>
    <div class="input-group" style="margin-bottom:24px;">
      <div>
        <div class="input-group-label">Sell price per ${product.name} shard</div>
        <div class="input-group-sub">Bazaar or AH sell order — supports 560k, 1.03m etc.</div>
      </div>
      <input class="smart-input" type="text" id="sell_inp" value="${displayNum(r.sellPrice)}" autocomplete="off" />
    </div>

    <div class="cost-per-shard-box">
      <div>
        <div class="cps-label">Cost per shard</div>
        <div class="cps-val ${r.profitPerShard >= 0 ? 'pos' : 'neg'}" id="cps_val">${fmt(r.costPerShard)}</div>
        <div class="cps-sub" id="cps_sub">you spend this per shard produced</div>
      </div>
      <div style="text-align:right;">
        <div class="cps-label">Profit per shard</div>
        <div class="cps-val ${r.profitPerShard >= 0 ? 'pos' : 'neg'}" id="pps_val">${r.profitPerShard >= 0 ? '+' : ''}${fmt(r.profitPerShard)}</div>
        <div class="cps-sub" id="pps_sub">per shard sold</div>
      </div>
    </div>

    <div class="grid-4">
      <div class="card">
        <div class="card-label">Total Cost</div>
        <div class="card-val red" id="s_cost">${fmt(r.totalCost)}</div>
        <div class="card-sub">coins spent</div>
      </div>
      <div class="card">
        <div class="card-label">Revenue</div>
        <div class="card-val accent" id="s_rev">${fmt(r.revenue)}</div>
        <div class="card-sub">coins in</div>
      </div>
      <div class="card">
        <div class="card-label">Net Profit</div>
        <div class="card-val ${r.profit >= 0 ? 'accent' : 'red'}" id="s_profit">${r.profit >= 0 ? '+' : ''}${fmt(r.profit)}</div>
        <div class="card-sub">total gain</div>
      </div>
      <div class="card">
        <div class="card-label">Margin</div>
        <div class="card-val ${r.profit >= 0 ? 'gold' : 'red'}" id="s_margin">${r.margin.toFixed(1)}%</div>
        <div class="card-sub">profit margin</div>
      </div>
    </div>

    <div class="profit-box">
      <div class="profit-row"><span class="label">Total Spend</span><span class="val neg" id="pb_cost">-${fmt(r.totalCost)}</span></div>
      <div class="profit-row"><span class="label" id="pb_rev_lbl">Revenue (${r.qty} × ${fmt(r.sellPrice)})</span><span class="val pos" id="pb_rev">+${fmt(r.revenue)}</span></div>
      <div class="profit-row"><span class="label">Net Profit</span><span class="val ${r.profit >= 0 ? 'pos' : 'neg'}" id="pb_profit">${r.profit >= 0 ? '+' : ''}${fmt(r.profit)}</span></div>
    </div>
  `;

  // qty
  div.querySelector('#qty_inp').addEventListener('input', function() {
    const v = parseNum(this.value);
    this.classList.toggle('error', isNaN(v) && this.value !== '');
    setQtyStr(product.id, this.value);
    if (!isNaN(v)) updateDisplay(product, div);
  });

  // ingredient prices
  r.ings.forEach(ing => {
    div.querySelector(`#iprice_${ing.id}`).addEventListener('input', function() {
      const v = parseNum(this.value);
      this.classList.toggle('error', isNaN(v) && this.value !== '');
      if (!isNaN(v)) { setPrice(product.id, ing.id, v); updateDisplay(product, div); }
    });
  });

  // sell price
  div.querySelector('#sell_inp').addEventListener('input', function() {
    const v = parseNum(this.value);
    this.classList.toggle('error', isNaN(v) && this.value !== '');
    if (!isNaN(v)) { setSell(product.id, v); updateDisplay(product, div); }
  });

  return div;
}

function updateDisplay(product, div) {
  const r = calc(product);

  r.ings.forEach(ing => {
    const qe = div.querySelector(`#iqty_${ing.id}`);
    const ce = div.querySelector(`#icost_${ing.id}`);
    if (qe) qe.textContent = ing.needed.toLocaleString();
    if (ce) ce.textContent = fmtCoins(ing.cost);
  });

  div.querySelector('#cps_val').textContent = fmt(r.costPerShard);
  div.querySelector('#cps_val').className = 'cps-val pos';
  div.querySelector('#pps_val').textContent = (r.profitPerShard >= 0 ? '+' : '') + fmt(r.profitPerShard);
  div.querySelector('#pps_val').className = 'cps-val ' + (r.profitPerShard >= 0 ? 'pos' : 'neg');

  div.querySelector('#s_cost').textContent = fmt(r.totalCost);
  div.querySelector('#s_rev').textContent = fmt(r.revenue);
  const pe = div.querySelector('#s_profit');
  pe.textContent = (r.profit >= 0 ? '+' : '') + fmt(r.profit);
  pe.className = 'card-val ' + (r.profit >= 0 ? 'accent' : 'red');
  const me = div.querySelector('#s_margin');
  me.textContent = r.margin.toFixed(1) + '%';
  me.className = 'card-val ' + (r.profit >= 0 ? 'gold' : 'red');

  div.querySelector('#pb_cost').textContent = '-' + fmt(r.totalCost);
  div.querySelector('#pb_rev_lbl').textContent = `Revenue (${r.qty} × ${fmt(r.sellPrice)})`;
  div.querySelector('#pb_rev').textContent = '+' + fmt(r.revenue);
  const ppe = div.querySelector('#pb_profit');
  ppe.textContent = (r.profit >= 0 ? '+' : '') + fmt(r.profit);
  ppe.className = 'val ' + (r.profit >= 0 ? 'pos' : 'neg');
}

function buildManage() {
  const div = document.createElement('div');
  div.className = 'panel active';
  div.innerHTML = `
    <div class="manage-panel">
      <h3>Current Products</h3>
      <div id="product-list">
        ${S.products.map(p => `
          <div class="product-list-item">
            <div>
              <div class="name">${p.name}</div>
              <div class="chain-mini">${p.chain}</div>
            </div>
            <button class="btn btn-danger" onclick="deleteProduct('${p.id}')">Remove</button>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="manage-panel">
      <h3>Add New Product</h3>
      <div class="form-row">
        <div class="form-field" style="flex:1;min-width:200px;">
          <label>Product name</label>
          <input type="text" id="new-name" placeholder="e.g. Wartybug" />
        </div>
        <div class="form-field" style="flex:2;min-width:300px;">
          <label>Fusion chain description</label>
          <input type="text" id="new-chain" placeholder="e.g. A + B → C → C + D → Product" />
        </div>
      </div>

      <div class="section-label" style="margin-top:8px;">Ingredients</div>
      <div id="ing-fields">
        <div class="form-row ing-field-row">
          <div class="form-field"><label>Ingredient name</label><input type="text" class="ing-name-inp" placeholder="e.g. Pest" /></div>
          <div class="form-field"><label>Per 1 output</label><input type="number" class="ing-per-inp" placeholder="6.25" step="0.01" style="min-width:110px;" /></div>
          <div class="form-field"><label>Default price</label><input type="text" class="ing-price-inp" placeholder="36k" style="min-width:110px;" /></div>
          <button class="btn btn-ghost" style="align-self:flex-end;" onclick="removeIngRow(this)">×</button>
        </div>
      </div>
      <div class="form-row" style="margin-top:12px;align-items:flex-end;">
        <button class="btn btn-ghost" onclick="addIngRow()" style="align-self:flex-end;">+ add ingredient</button>
        <div class="form-field">
          <label>Default sell price</label>
          <input type="text" id="new-sell" placeholder="500k" style="min-width:120px;" />
        </div>
        <button class="btn btn-accent" onclick="addProduct()">Add Product</button>
      </div>
      <div id="add-error" class="alert"></div>
    </div>
  `;
  return div;
}

function addIngRow() {
  const c = document.getElementById('ing-fields');
  const row = document.createElement('div');
  row.className = 'form-row ing-field-row';
  row.innerHTML = `
    <div class="form-field"><label>Ingredient name</label><input type="text" class="ing-name-inp" placeholder="e.g. Pest" /></div>
    <div class="form-field"><label>Per 1 output</label><input type="number" class="ing-per-inp" placeholder="6.25" step="0.01" style="min-width:110px;" /></div>
    <div class="form-field"><label>Default price</label><input type="text" class="ing-price-inp" placeholder="36k" style="min-width:110px;" /></div>
    <button class="btn btn-ghost" style="align-self:flex-end;" onclick="removeIngRow(this)">×</button>
  `;
  c.appendChild(row);
}

function removeIngRow(btn) {
  const rows = document.querySelectorAll('.ing-field-row');
  if (rows.length > 1) btn.closest('.ing-field-row').remove();
}

function addProduct() {
  const name  = document.getElementById('new-name').value.trim();
  const chain = document.getElementById('new-chain').value.trim();
  const sell  = parseNum(document.getElementById('new-sell').value) || 0;
  const errEl = document.getElementById('add-error');
  errEl.style.display = 'none';

  if (!name) { errEl.textContent = 'Product name is required.'; errEl.style.display = 'block'; return; }

  const rows = document.querySelectorAll('.ing-field-row');
  const ingredients = [];
  const defaultPrices = { sell };

  for (const row of rows) {
    const n     = row.querySelector('.ing-name-inp').value.trim();
    const per   = parseFloat(row.querySelector('.ing-per-inp').value);
    const price = parseNum(row.querySelector('.ing-price-inp').value) || 0;
    if (!n || isNaN(per)) { errEl.textContent = 'Each ingredient needs a name and qty per output.'; errEl.style.display = 'block'; return; }
    const ingId = n.toLowerCase().replace(/\s+/g, '_');
    ingredients.push({ id: ingId, name: n, perUnit: per });
    defaultPrices[ingId] = price;
  }

  if (!ingredients.length) { errEl.textContent = 'Add at least one ingredient.'; errEl.style.display = 'block'; return; }

  const id = name.toLowerCase().replace(/[^a-z0-9]/g, '_') + '_' + Date.now();
  const newProduct = { id, name, chain: chain || name, ingredients, defaultPrices };
  S.products.push(newProduct);

  // Persist the default prices into S.prices immediately so they're remembered
  ingredients.forEach(ing => { S.prices[`${id}_${ing.id}`] = defaultPrices[ing.id]; });
  S.prices[`${id}_sell`] = sell;
  S.qtys[id] = '64';

  S.activeTab = id;
  saveState(S);
  renderAll();
}

function deleteProduct(id) {
  if (!confirm('Remove this product?')) return;
  S.products = S.products.filter(p => p.id !== id);
  // Clean up stored prices and qtys for this product
  Object.keys(S.prices).filter(k => k.startsWith(id + '_')).forEach(k => delete S.prices[k]);
  delete S.qtys[id];
  if (S.activeTab === id) S.activeTab = S.products[0]?.id || '__manage__';
  saveState(S);
  renderAll();
}

renderAll();
</script>
</body>
</html>
