<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shard Flip Calculator</title>
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c24;
    --border: #252a36;
    --border2: #2e3545;
    --text: #f0f2fa;
    --muted: #8b95aa;
    --accent: #7ee8b8;
    --accent2: #4fd1c5;
    --gold: #f6c90e;
    --red: #ff5e5e;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 17px;
    font-weight: 400;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(126,232,184,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(126,232,184,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; max-width: 1300px; margin: 0 auto; padding: 0 36px 120px; }

  header {
    padding: 56px 0 44px;
    display: flex; align-items: flex-end; justify-content: space-between;
    flex-wrap: wrap; gap: 24px;
    border-bottom: 1px solid var(--border); margin-bottom: 48px;
  }
  .logo { font-size: 36px; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .logo-sub { font-size: 13px; color: var(--muted); margin-top: 6px; letter-spacing: 0.05em; }

  /* Tab bar */
  .tabs {
    display: flex; gap: 5px; align-items: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 5px; flex-wrap: wrap;
  }
  .tab {
    padding: 11px 22px; border-radius: 10px;
    font-size: 15px; font-weight: 500; cursor: pointer;
    color: var(--muted); transition: all 0.15s;
    border: none; background: none; font-family: inherit; white-space: nowrap;
  }
  .tab:hover { color: var(--text); }
  .tab.active { background: var(--surface2); color: var(--accent); border: 1px solid var(--border2); }
  .tab-manage {
    margin-left: auto;
    color: var(--accent); border: 1px solid var(--accent2);
    background: rgba(126,232,184,0.07);
  }
  .tab-manage:hover { background: rgba(126,232,184,0.15); color: var(--accent); }
  .tab-manage.active { background: rgba(126,232,184,0.18); color: var(--accent); border-color: var(--accent); }

  .panel { display: none; }
  .panel.active { display: block; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .product-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    flex-wrap: wrap; gap: 16px; margin-bottom: 36px;
  }
  .product-title { font-size: 34px; font-weight: 700; }
  .chain-badge {
    font-size: 13px; color: var(--muted);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 18px; line-height: 1.9;
    max-width: 640px; letter-spacing: 0.01em;
  }
  .chain-badge .arrow { color: var(--accent); font-weight: 600; }

  .section-label {
    font-size: 11px; font-weight: 600; color: var(--muted);
    letter-spacing: 0.14em; text-transform: uppercase;
    margin: 32px 0 16px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  /* Pulse animation for updated cards */
  @keyframes cardPulse {
    0%   { box-shadow: 0 0 0 0 rgba(126,232,184,0); }
    30%  { box-shadow: 0 0 0 4px rgba(126,232,184,0.3); }
    100% { box-shadow: 0 0 0 0 rgba(126,232,184,0); }
  }
  .card.pulse { animation: cardPulse 0.6s ease-out; }

  .grid-4 { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 18px; margin-bottom: 24px; }
  @media (max-width: 860px) { .grid-4 { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 500px) { .grid-4 { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 26px;
  }
  .card-label {
    font-size: 11px; font-weight: 600; color: var(--muted);
    letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 12px;
  }
  .card-val { font-size: 36px; font-weight: 700; line-height: 1; }
  .card-val.accent { color: var(--accent); }
  .card-val.gold { color: var(--gold); }
  .card-val.red { color: var(--red); }
  .card-sub { font-size: 13px; color: var(--muted); margin-top: 8px; }

  /* Cost/profit per shard big box */
  .cps-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 26px 30px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 20px; margin-bottom: 24px;
  }
  .cps-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; }
  .cps-val { font-size: 44px; font-weight: 700; line-height: 1; }
  .cps-val.pos { color: var(--accent); }
  .cps-val.neg { color: var(--red); }
  .cps-sub { font-size: 13px; color: var(--muted); margin-top: 6px; }

  .input-group {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 24px 28px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; flex-wrap: wrap; margin-bottom: 12px;
  }
  .input-group-label { font-size: 18px; font-weight: 500; flex: 1; min-width: 160px; }
  .input-group-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

  .smart-input {
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 10px; color: var(--text);
    font-size: 20px; font-weight: 600;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 12px 18px; width: 160px; text-align: right;
    transition: border-color 0.15s; outline: none;
  }
  .smart-input:focus { border-color: var(--accent); }
  .smart-input.error { border-color: var(--red); }

  /* Budget row */
  .budget-row {
    background: rgba(246,201,14,0.06); border: 1px solid rgba(246,201,14,0.2);
    border-radius: 14px; padding: 20px 28px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; flex-wrap: wrap; margin-bottom: 12px;
  }
  .budget-row .input-group-label { font-size: 16px; }
  .budget-badge {
    font-size: 13px; color: var(--gold);
    background: rgba(246,201,14,0.1); border: 1px solid rgba(246,201,14,0.2);
    border-radius: 8px; padding: 4px 12px; margin-top: 4px; display: inline-block;
  }

  /* Bazaar button */
  .bazaar-btn {
    display: flex; align-items: center; gap: 8px;
    background: rgba(96,165,250,0.1); border: 1px solid rgba(96,165,250,0.3);
    color: #93c5fd; border-radius: 10px; padding: 10px 18px;
    font-size: 14px; font-weight: 500; font-family: inherit;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .bazaar-btn:hover { background: rgba(96,165,250,0.18); }
  .bazaar-btn.loading { opacity: 0.6; pointer-events: none; }
  .bazaar-status { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .bazaar-status.ok { color: var(--accent); }
  .bazaar-status.err { color: var(--red); }

  /* Ingredients */
  .ingredients {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden; margin-bottom: 24px;
  }
  .ing-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px; background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-size: 11px; font-weight: 600; color: var(--muted);
    letter-spacing: 0.12em; text-transform: uppercase;
  }
  .ing-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 28px; border-bottom: 1px solid var(--border);
    gap: 16px; flex-wrap: wrap;
  }
  .ing-row:last-child { border-bottom: none; }
  .ing-name { font-size: 18px; font-weight: 500; min-width: 160px; }
  .ing-right { display: flex; align-items: center; gap: 28px; flex-wrap: wrap; }
  .ing-qty { font-size: 20px; font-weight: 600; color: var(--accent); min-width: 80px; text-align: right; }
  .ing-cost { font-size: 15px; color: var(--muted); min-width: 110px; text-align: right; }

  /* Mobile ingredient layout */
  @media (max-width: 600px) {
    .ing-header { display: none; }
    .ing-row {
      flex-direction: column; align-items: flex-start;
      padding: 16px; gap: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; margin: 8px; width: calc(100% - 16px);
    }
    .ing-row:last-child { border-bottom: 1px solid var(--border); }
    .ing-right { width: 100%; justify-content: space-between; }
    .ing-qty, .ing-cost { min-width: unset; text-align: left; }
    .smart-input { width: 120px; font-size: 17px; }
    .ingredients { border-radius: 14px; overflow: visible; background: transparent; border: none; }
    .cps-val { font-size: 32px; }
    .card-val { font-size: 28px; }
    .product-title { font-size: 26px; }
    .wrapper { padding: 0 16px 100px; }
    header { padding: 32px 0 28px; }
  }

  .profit-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden; margin-top: 24px;
  }
  .profit-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 28px; border-bottom: 1px solid var(--border);
  }
  .profit-row:last-child { border-bottom: none; background: var(--surface2); }
  .profit-row .label { font-size: 13px; font-weight: 600; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .profit-row .val { font-size: 22px; font-weight: 700; }
  .profit-row .val.pos { color: var(--accent); }
  .profit-row .val.neg { color: var(--red); }

  /* Manage */
  .manage-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 32px; margin-bottom: 24px; }
  .manage-panel h3 { font-size: 22px; font-weight: 600; margin-bottom: 24px; }
  .form-row { display: flex; align-items: flex-end; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
  .form-field { display: flex; flex-direction: column; gap: 7px; }
  .form-field label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .form-field input {
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 10px; color: var(--text);
    font-size: 16px; font-family: inherit; font-weight: 400;
    padding: 11px 16px; outline: none; min-width: 160px;
  }
  .form-field input:focus { border-color: var(--accent); }
  .btn { padding: 12px 24px; border-radius: 10px; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-accent { background: var(--accent); color: #0a0c10; }
  .btn-accent:hover { background: var(--accent2); }
  .btn-danger { background: rgba(255,94,94,0.12); color: var(--red); border: 1px solid rgba(255,94,94,0.3); }
  .btn-danger:hover { background: rgba(255,94,94,0.22); }
  .btn-ghost { background: var(--surface2); color: var(--muted); border: 1px solid var(--border2); }
  .btn-ghost:hover { color: var(--text); }

  .product-list-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; border: 1px solid var(--border);
    border-radius: 10px; margin-bottom: 10px; background: var(--surface2);
  }
  .product-list-item .p-name { font-size: 17px; font-weight: 500; }
  .product-list-item .p-chain { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .alert { background: rgba(255,94,94,0.08); border: 1px solid rgba(255,94,94,0.3); border-radius: 10px; padding: 14px 18px; font-size: 14px; color: var(--red); margin-top: 14px; display: none; }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div>
      <div class="logo">Shard <span>Flip</span> Calculator</div>
      <div class="logo-sub">HYPIXEL SKYBLOCK FUSION CALCULATOR</div>
    </div>
    <div class="tabs" id="tabBar"></div>
  </header>
  <div id="panels"></div>
</div>

<script>
// ─── PARSE ───────────────────────────────────────────────────────────────────
function parseNum(raw) {
  if (raw == null) return NaN;
  const s = String(raw).replace(/,/g, '').trim().toLowerCase();
  if (s === '') return NaN;
  const m = s.match(/^([0-9]*\.?[0-9]+)\s*([km]?)$/);
  if (!m) return NaN;
  let n = parseFloat(m[1]);
  if (m[2] === 'k') n *= 1e3;
  if (m[2] === 'm') n *= 1e6;
  return n;
}
function displayNum(n) {
  if (!n && n !== 0) return '';
  n = Math.round(n);
  if (n >= 1e6 && n % 1e6 === 0) return (n/1e6) + 'm';
  if (n >= 1e6) return parseFloat((n/1e6).toFixed(3)) + 'm';
  if (n >= 1e3 && n % 1e3 === 0) return (n/1e3) + 'k';
  if (n >= 1e3) return parseFloat((n/1e3).toFixed(2)) + 'k';
  return String(n);
}
function fmt(n) {
  if (isNaN(n) || n == null) return '—';
  n = Math.round(n);
  const a = Math.abs(n);
  if (a >= 1e9) return (n/1e9).toFixed(2) + 'B';
  if (a >= 1e6) return (n/1e6).toFixed(2) + 'M';
  if (a >= 1e3) return (n/1e3).toFixed(1) + 'k';
  return n.toLocaleString();
}
function fmtCoins(n) { return fmt(n) + ' 🪙'; }
function slugify(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }

// ─── BAZAAR MAP ──────────────────────────────────────────────────────────────
// Maps internal ingredient IDs → Hypixel Bazaar product IDs
const BAZAAR_MAP = {
  mz:        'MINER_ZOMBIE_SHARD',
  chill:     'CHILL_SHARD',
  invisibug: 'INVISIBUG_SHARD',
  pest:      'PEST_SHARD',
  glacite:   'GLACITE_WALKER_SHARD',
  bambuleaf: 'BAMBULEAF_SHARD',
  ghost:     'GHOST_SHARD',
  cod:       'COD_SHARD',
  bezal:     'BEZAL_SHARD',
  draconic:  'DRACONIC_SHARD',
};

// ─── DEFAULT DATA ─────────────────────────────────────────────────────────────
const DEFAULTS = [
  {
    id: 'stalagmite', name: 'Stalagmite',
    chain: 'MZ + Chill → Trog → Trog + MZ → Quartzfang → QF + MZ → Stalagmite',
    ingredients: [
      { id: 'mz', name: 'Miner Zombie', perUnit: 1560/64 },
      { id: 'chill', name: 'Chill', perUnit: 1000/64 },
    ],
    defaultPrices: { mz: 11000, chill: 6000, sell: 560000 }
  },
  {
    id: 'lunar-moth', name: 'Lunar Moth',
    chain: 'MZ + Invisibug → Termite → Termite + Invisibug → Ladybug → Ladybug + Invisibug → Lunar Moth',
    ingredients: [
      { id: 'mz', name: 'Miner Zombie', perUnit: 1000/64 },
      { id: 'invisibug', name: 'Invisibug', perUnit: 1560/64 },
    ],
    defaultPrices: { mz: 11000, invisibug: 23500, sell: 1030000 }
  },
  {
    id: 'cropeetle', name: 'Cropeetle',
    chain: 'Pest + Chill → Mantis → MZ + Invisibug → Termite → Mantis + Termite → Cropeetle',
    ingredients: [
      { id: 'pest', name: 'Pest', perUnit: 1000/160 },
      { id: 'chill', name: 'Chill', perUnit: 1000/160 },
      { id: 'mz', name: 'Miner Zombie', perUnit: 1000/160 },
      { id: 'invisibug', name: 'Invisibug', perUnit: 1000/160 },
    ],
    defaultPrices: { pest: 36000, chill: 6000, mz: 12000, invisibug: 25000, sell: 620000 }
  },
  {
    id: 'pandarai', name: 'Pandarai',
    chain: 'Bambuleaf OR Mochibear + Glacite Walker → Pandarai',
    ingredients: [
      { id: 'bambuleaf', name: 'Bambuleaf / Mochibear', perUnit: 1000/400 },
      { id: 'glacite', name: 'Glacite Walker', perUnit: 1000/400 },
    ],
    defaultPrices: { bambuleaf: 42000, glacite: 7500, sell: 204000 }
  },
  {
    id: 'sphinx', name: 'Sphinx',
    chain: 'Ghost + Cod → Sphinx',
    ingredients: [
      { id: 'ghost', name: 'Ghost', perUnit: 1000/200 },
      { id: 'cod', name: 'Cod', perUnit: 1000/200 },
    ],
    defaultPrices: { ghost: 15000, cod: 2500, sell: 100000 }
  },
  {
    id: 'firefly', name: 'Firefly',
    chain: 'Pest + Chill → Mantis → Mantis + Bezal → Firefly',
    ingredients: [
      { id: 'pest', name: 'Pest', perUnit: 1000/160 },
      { id: 'chill', name: 'Chill', perUnit: 1000/160 },
      { id: 'bezal', name: 'Bezal', perUnit: 400/160 },
    ],
    defaultPrices: { pest: 36000, chill: 6000, bezal: 17000, sell: 450000 }
  },
  {
    id: 'dragonfly', name: 'Dragonfly',
    chain: 'Pest + Chill → Mantis → Mantis + Bezal → Firefly → Firefly + Draconic → Dragonfly',
    ingredients: [
      { id: 'pest', name: 'Pest', perUnit: 1000/64 },
      { id: 'chill', name: 'Chill', perUnit: 1000/64 },
      { id: 'bezal', name: 'Bezal', perUnit: 400/64 },
      { id: 'draconic', name: 'Draconic', perUnit: 160/64 },
    ],
    defaultPrices: { pest: 43000, chill: 6000, bezal: 13500, draconic: 135000, sell: 1540000 }
  },
];

// ─── STATE ───────────────────────────────────────────────────────────────────
function loadState() {
  try {
    return {
      products:  JSON.parse(localStorage.getItem('sfc3_products') || 'null') || DEFAULTS,
      prices:    JSON.parse(localStorage.getItem('sfc3_prices')   || '{}'),
      qtys:      JSON.parse(localStorage.getItem('sfc3_qtys')     || '{}'),
      budgets:   JSON.parse(localStorage.getItem('sfc3_budgets')  || '{}'),
      activeTab: localStorage.getItem('sfc3_active') || DEFAULTS[0].id,
    };
  } catch(e) {
    return { products: DEFAULTS, prices: {}, qtys: {}, budgets: {}, activeTab: DEFAULTS[0].id };
  }
}
function saveState() {
  localStorage.setItem('sfc3_products', JSON.stringify(S.products));
  localStorage.setItem('sfc3_prices',   JSON.stringify(S.prices));
  localStorage.setItem('sfc3_qtys',     JSON.stringify(S.qtys));
  localStorage.setItem('sfc3_budgets',  JSON.stringify(S.budgets));
  localStorage.setItem('sfc3_active',   S.activeTab);
}
let S = loadState();

// ─── ACCESSORS ───────────────────────────────────────────────────────────────
function getPrice(pid, iid) {
  const k = `${pid}__${iid}`;
  if (S.prices[k] !== undefined) return S.prices[k];
  const p = S.products.find(x => x.id === pid);
  return (p?.defaultPrices?.[iid]) || 0;
}
function getSell(pid) {
  const k = `${pid}__sell`;
  if (S.prices[k] !== undefined) return S.prices[k];
  const p = S.products.find(x => x.id === pid);
  return p?.defaultPrices?.sell || 0;
}
function getQtyStr(pid) { return S.qtys[pid] || '64'; }
function getQty(pid)    { return parseNum(getQtyStr(pid)) || 64; }
function getBudgetStr(pid) { return S.budgets[pid] || ''; }

function setPrice(pid, iid, v) { S.prices[`${pid}__${iid}`] = Math.round(v); saveState(); }
function setSell(pid, v)       { S.prices[`${pid}__sell`] = Math.round(v); saveState(); }
function setQtyStr(pid, v)     { S.qtys[pid] = v; saveState(); }
function setBudgetStr(pid, v)  { S.budgets[pid] = v; saveState(); }

// ─── CALC ─────────────────────────────────────────────────────────────────────
function calc(product) {
  const qty = getQty(product.id);
  let totalCost = 0;
  const ings = product.ingredients.map(ing => {
    const price  = getPrice(product.id, ing.id);
    const needed = Math.ceil(ing.perUnit * qty);
    const cost   = Math.round(needed * price);
    totalCost   += cost;
    return { ...ing, price, needed, cost };
  });
  totalCost = Math.round(totalCost);
  const sellPrice      = getSell(product.id);
  const revenue        = Math.round(qty * sellPrice);
  const profit         = Math.round(revenue - totalCost);
  const costPerShard   = qty > 0 ? Math.round(totalCost / qty) : 0;
  const profitPerShard = qty > 0 ? Math.round(profit / qty) : 0;
  const margin         = totalCost > 0 ? profit / totalCost * 100 : 0;
  return { qty, ings, totalCost, sellPrice, revenue, profit, costPerShard, profitPerShard, margin };
}

// ─── PULSE ANIMATION ─────────────────────────────────────────────────────────
function pulseCards() {
  document.querySelectorAll('.grid-4 .card').forEach(c => {
    c.classList.remove('pulse');
    void c.offsetWidth; // reflow to restart animation
    c.classList.add('pulse');
  });
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function renderAll() { renderTabs(); renderPanels(); }

function renderTabs() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = '';
  S.products.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (p.id === S.activeTab ? ' active' : '');
    btn.textContent = p.name;
    btn.dataset.tabId = p.id;
    bar.appendChild(btn);
  });
  const m = document.createElement('button');
  m.className = 'tab tab-manage' + (S.activeTab === '__manage__' ? ' active' : '');
  m.textContent = '+ manage';
  m.dataset.tabId = '__manage__';
  bar.appendChild(m);
}

// Single delegated listener for tab clicks
document.getElementById('tabBar').addEventListener('click', e => {
  const btn = e.target.closest('[data-tab-id]');
  if (!btn) return;
  S.activeTab = btn.dataset.tabId;
  saveState();
  renderAll();
});

function renderPanels() {
  const c = document.getElementById('panels');
  c.innerHTML = '';
  if (S.activeTab === '__manage__') { c.appendChild(buildManage()); return; }
  const p = S.products.find(x => x.id === S.activeTab);
  if (p) c.appendChild(buildProduct(p));
}

function sectionLabel(text) {
  const el = document.createElement('div');
  el.className = 'section-label';
  el.textContent = text;
  return el;
}

function updateDisplay(pid) {
  const product = S.products.find(x => x.id === pid);
  if (!product) return;
  const r = calc(product);

  r.ings.forEach(ing => {
    const qe = document.getElementById(`iqty-${pid}-${ing.id}`);
    const ce = document.getElementById(`icost-${pid}-${ing.id}`);
    if (qe) qe.textContent = ing.needed.toLocaleString();
    if (ce) ce.textContent = fmtCoins(ing.cost);
  });

  const set = (id, val) => { const e = document.getElementById(id); if (e) e.textContent = val; };
  const setClass = (id, cls) => { const e = document.getElementById(id); if (e) e.className = cls; };

  set(`cps-val-${pid}`, fmt(r.costPerShard));
  set(`pps-val-${pid}`, (r.profitPerShard >= 0 ? '+' : '') + fmt(r.profitPerShard));
  setClass(`pps-val-${pid}`, 'cps-val ' + (r.profitPerShard >= 0 ? 'pos' : 'neg'));

  set(`s-cost-${pid}`, fmt(r.totalCost));
  set(`s-rev-${pid}`, fmt(r.revenue));
  set(`s-profit-${pid}`, (r.profit >= 0 ? '+' : '') + fmt(r.profit));
  setClass(`s-profit-${pid}`, 'card-val ' + (r.profit >= 0 ? 'accent' : 'red'));
  set(`s-margin-${pid}`, r.margin.toFixed(1) + '%');
  setClass(`s-margin-${pid}`, 'card-val ' + (r.profit >= 0 ? 'gold' : 'red'));

  set(`pb-cost-${pid}`, '-' + fmt(r.totalCost));
  set(`pb-rev-lbl-${pid}`, `Revenue (${r.qty} × ${fmt(r.sellPrice)})`);
  set(`pb-rev-${pid}`, '+' + fmt(r.revenue));
  set(`pb-profit-${pid}`, (r.profit >= 0 ? '+' : '') + fmt(r.profit));
  setClass(`pb-profit-${pid}`, 'val ' + (r.profit >= 0 ? 'pos' : 'neg'));

  pulseCards();
}

// ─── EVENT DELEGATION (single listener on #panels) ────────────────────────────
document.getElementById('panels').addEventListener('input', e => {
  const el = e.target;
  const action = el.dataset.action;
  const pid = el.dataset.pid;

  // Qty input
  if (el.id && el.id.startsWith('inp-qty-')) {
    const p = el.id.replace('inp-qty-', '');
    el.classList.toggle('error', isNaN(parseNum(el.value)) && el.value !== '');
    setQtyStr(p, el.value);
    // Clear budget if qty manually set
    setBudgetStr(p, '');
    const bi = document.getElementById(`inp-budget-${p}`);
    if (bi) bi.value = '';
    if (!isNaN(parseNum(el.value))) updateDisplay(p);
    return;
  }

  // Budget input
  if (el.id && el.id.startsWith('inp-budget-')) {
    const p = el.id.replace('inp-budget-', '');
    const budget = parseNum(el.value);
    el.classList.toggle('error', isNaN(budget) && el.value !== '');
    setBudgetStr(p, el.value);
    if (!isNaN(budget) && budget > 0) {
      const product = S.products.find(x => x.id === p);
      if (product) {
        const r = calc(product);
        if (r.costPerShard > 0) {
          const maxQty = Math.floor(budget / r.costPerShard);
          setQtyStr(p, String(maxQty));
          const qi = document.getElementById(`inp-qty-${p}`);
          if (qi) qi.value = displayNum(maxQty);
          updateDisplay(p);
          const badge = document.getElementById(`budget-badge-${p}`);
          if (badge) badge.textContent = `Max ${maxQty.toLocaleString()} shards with this budget`;
        }
      }
    } else {
      const badge = document.getElementById(`budget-badge-${p}`);
      if (badge) badge.textContent = 'Enter a budget to auto-calculate max shards';
    }
    return;
  }

  // Price inputs
  if (action === 'set-price') {
    const v = parseNum(el.value);
    el.classList.toggle('error', isNaN(v) && el.value !== '');
    if (!isNaN(v)) { setPrice(pid, el.dataset.iid, v); updateDisplay(pid); }
    return;
  }

  // Sell price
  if (action === 'set-sell') {
    const v = parseNum(el.value);
    el.classList.toggle('error', isNaN(v) && el.value !== '');
    if (!isNaN(v)) { setSell(pid, v); updateDisplay(pid); }
    return;
  }
});

// ─── BAZAAR FETCH (delegated click) ──────────────────────────────────────────
document.getElementById('panels').addEventListener('click', async e => {
  const btn = e.target.closest('[data-action="fetch-bazaar"]');
  if (!btn) return;
  const pid = btn.dataset.pid;
  const statusEl = document.getElementById(`bazaar-status-${pid}`);
  btn.classList.add('loading');
  btn.textContent = '⟳ Fetching...';
  statusEl.className = 'bazaar-status';
  statusEl.textContent = 'Connecting to Hypixel API...';

  try {
    const res = await fetch('https://api.hypixel.net/v2/skyblock/bazaar');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const products = data.products;

    const product = S.products.find(x => x.id === pid);
    if (!product) throw new Error('Product not found');

    let updated = 0;
    product.ingredients.forEach(ing => {
      const bazaarKey = BAZAAR_MAP[ing.id];
      if (!bazaarKey || !products[bazaarKey]) return;
      const buyPrice = Math.round(products[bazaarKey].quick_status?.buyPrice || 0);
      if (buyPrice > 0) {
        setPrice(pid, ing.id, buyPrice);
        const inp = document.getElementById(`inp-price-${pid}-${ing.id}`);
        if (inp) inp.value = displayNum(buyPrice);
        updated++;
      }
    });

    updateDisplay(pid);
    statusEl.className = 'bazaar-status ok';
    statusEl.textContent = `✓ Updated ${updated} price${updated !== 1 ? 's' : ''} from Bazaar`;
  } catch (err) {
    statusEl.className = 'bazaar-status err';
    statusEl.textContent = `✗ Failed: ${err.message}. Try a CORS proxy or check your connection.`;
  }

  btn.classList.remove('loading');
  btn.innerHTML = '⟳ Fetch Live Bazaar Prices';
});

// ─── MANAGE PANEL ────────────────────────────────────────────────────────────
function buildManage() {
  const div = document.createElement('div');
  div.className = 'panel active';

  // Current products list
  const listPanel = document.createElement('div');
  listPanel.className = 'manage-panel';
  const listH = document.createElement('h3');
  listH.textContent = 'Current Products';
  listPanel.appendChild(listH);

  S.products.forEach(p => {
    const item = document.createElement('div');
    item.className = 'product-list-item';

    const info = document.createElement('div');
    const nameEl = document.createElement('div');
    nameEl.className = 'p-name';
    nameEl.textContent = p.name;
    const chainEl = document.createElement('div');
    chainEl.className = 'p-chain';
    chainEl.textContent = p.chain;
    info.appendChild(nameEl);
    info.appendChild(chainEl);

    const delBtn = document.createElement('button');
    delBtn.className = 'btn btn-danger';
    delBtn.textContent = 'Remove';
    delBtn.dataset.action = 'delete-product';
    delBtn.dataset.pid = p.id;

    item.appendChild(info);
    item.appendChild(delBtn);
    listPanel.appendChild(item);
  });
  div.appendChild(listPanel);

  // Add product form
  const addPanel = document.createElement('div');
  addPanel.className = 'manage-panel';
  const addH = document.createElement('h3');
  addH.textContent = 'Add New Product';
  addPanel.appendChild(addH);

  addPanel.innerHTML += `
    <div class="form-row">
      <div class="form-field" style="flex:1;min-width:200px;">
        <label>Product name</label>
        <input type="text" id="new-name" placeholder="e.g. Wartybug" autocomplete="off" />
      </div>
      <div class="form-field" style="flex:2;min-width:300px;">
        <label>Fusion chain description</label>
        <input type="text" id="new-chain" placeholder="e.g. A + B → C → C + D → Product" autocomplete="off" />
      </div>
    </div>
    <div class="section-label" style="margin-top:8px;">Ingredients</div>
    <div id="ing-fields">
      <div class="form-row ing-field-row">
        <div class="form-field"><label>Ingredient name</label><input type="text" class="ing-name-inp" placeholder="e.g. Pest" autocomplete="off" /></div>
        <div class="form-field"><label>Per 1 output</label><input type="number" class="ing-per-inp" placeholder="6.25" step="0.01" style="min-width:110px;" /></div>
        <div class="form-field"><label>Default price</label><input type="text" class="ing-price-inp" placeholder="36k" autocomplete="off" style="min-width:110px;" /></div>
        <button class="btn btn-ghost" style="align-self:flex-end;" data-action="remove-ing-row">×</button>
      </div>
    </div>
    <div class="form-row" style="margin-top:12px;align-items:flex-end;">
      <button class="btn btn-ghost" data-action="add-ing-row">+ add ingredient</button>
      <div class="form-field">
        <label>Default sell price</label>
        <input type="text" id="new-sell" placeholder="500k" autocomplete="off" style="min-width:120px;" />
      </div>
      <button class="btn btn-accent" data-action="add-product">Add Product</button>
    </div>
    <div id="add-error" class="alert"></div>
  `;
  div.appendChild(addPanel);
  return div;
}

// Manage panel delegated clicks
document.getElementById('panels').addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;

  if (action === 'delete-product') {
    const pid = btn.dataset.pid;
    if (!confirm('Remove this product?')) return;
    S.products = S.products.filter(p => p.id !== pid);
    Object.keys(S.prices).filter(k => k.startsWith(pid + '__')).forEach(k => delete S.prices[k]);
    delete S.qtys[pid];
    delete S.budgets[pid];
    if (S.activeTab === pid) S.activeTab = S.products[0]?.id || '__manage__';
    saveState();
    renderAll();
    return;
  }

  if (action === 'add-ing-row') {
    const c = document.getElementById('ing-fields');
    const row = document.createElement('div');
    row.className = 'form-row ing-field-row';
    row.innerHTML = `
      <div class="form-field"><label>Ingredient name</label><input type="text" class="ing-name-inp" placeholder="e.g. Pest" autocomplete="off" /></div>
      <div class="form-field"><label>Per 1 output</label><input type="number" class="ing-per-inp" placeholder="6.25" step="0.01" style="min-width:110px;" /></div>
      <div class="form-field"><label>Default price</label><input type="text" class="ing-price-inp" placeholder="36k" autocomplete="off" style="min-width:110px;" /></div>
      <button class="btn btn-ghost" style="align-self:flex-end;" data-action="remove-ing-row">×</button>
    `;
    c.appendChild(row);
    return;
  }

  if (action === 'remove-ing-row') {
    const rows = document.querySelectorAll('.ing-field-row');
    if (rows.length > 1) btn.closest('.ing-field-row').remove();
    return;
  }

  if (action === 'add-product') {
    const nameInp  = document.getElementById('new-name');
    const chainInp = document.getElementById('new-chain');
    const sellInp  = document.getElementById('new-sell');
    const errEl    = document.getElementById('add-error');
    errEl.style.display = 'none';

    const name  = nameInp.value.trim();
    const chain = chainInp.value.trim();
    const sell  = parseNum(sellInp.value) || 0;

    if (!name) { errEl.textContent = 'Product name is required.'; errEl.style.display = 'block'; return; }

    // Slug-based ID
    let baseSlug = slugify(name);
    let id = baseSlug;
    let counter = 1;
    while (S.products.find(p => p.id === id)) { id = `${baseSlug}-${counter++}`; }

    const rows = document.querySelectorAll('.ing-field-row');
    const ingredients = [];
    const defaultPrices = { sell };

    for (const row of rows) {
      const n   = row.querySelector('.ing-name-inp').value.trim();
      const per = parseFloat(row.querySelector('.ing-per-inp').value);
      const p   = parseNum(row.querySelector('.ing-price-inp').value) || 0;
      if (!n || isNaN(per)) {
        errEl.textContent = 'Each ingredient needs a name and qty per output.';
        errEl.style.display = 'block'; return;
      }
      const iid = slugify(n);
      ingredients.push({ id: iid, name: n, perUnit: per });
      defaultPrices[iid] = Math.round(p);
    }

    if (!ingredients.length) { errEl.textContent = 'Add at least one ingredient.'; errEl.style.display = 'block'; return; }

    const newProduct = { id, name, chain: chain || name, ingredients, defaultPrices };
    S.products.push(newProduct);

    // Immediately persist all prices and default qty
    ingredients.forEach(ing => { S.prices[`${id}__${ing.id}`] = defaultPrices[ing.id]; });
    S.prices[`${id}__sell`] = Math.round(sell);
    S.qtys[id] = '64';

    S.activeTab = id;
    saveState();
    renderAll();
    return;
  }
});
